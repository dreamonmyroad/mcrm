<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0c1015">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- 基础路径（GitHub Pages 需要） -->
    <base href="./">
    
    <title>客户联系管理 Pro</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="./icons/icon-180x180.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* 样式与之前相同，省略... */
        :root {
            --bg: #0c1015;
            --bg-secondary: #131920;
            --card: #1a222c;
            --card-hover: #232d3a;
            --border: #2a3544;
            --accent: #00d4aa;
            --accent-hover: #00b894;
            --accent-soft: rgba(0, 212, 170, 0.12);
            --warning: #ffa726;
            --danger: #ff5252;
            --info: #42a5f5;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
        }
        /* ... 其他样式 ... */
    </style>
</head>
<body>
    <!-- 应用内容... -->

    <!-- PWA Install Toast -->
    <div class="pwa-install-toast" id="pwaInstallToast">
        <!-- ... -->
    </div>

    <!-- 模态框... -->

    <!-- GitHub Pages 兼容的 Service Worker -->
    <script>
        // 简化的 Service Worker（GitHub Pages 兼容）
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'crm-pwa-v1';
                
                self.addEventListener('install', e => {
                    e.waitUntil(self.skipWaiting());
                });
                
                self.addEventListener('activate', e => {
                    e.waitUntil(self.clients.claim());
                });
                
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => {
                        return new Response('Offline mode');
                    }));
                });
            `;
            
            // 使用 data URI 方式注册（GitHub Pages 兼容）
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl)
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.log('SW failed:', err));
        }

        // PWA Install Prompt
        let deferredPrompt;
        const installToast = document.getElementById('pwaInstallToast');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installToast?.classList.add('show');
        });

        document.getElementById('pwaInstallBtn')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('User choice:', outcome);
            deferredPrompt = null;
            installToast?.classList.remove('show');
        });
    </script>

    <!-- 应用逻辑... -->
    <script>
        // 你的完整应用代码...
    </script>
</body>
</html>
