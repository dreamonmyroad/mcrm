<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0c1015">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>客户拜访管理 Pro</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIua1i+ivleiuoeahgeW4ruWkp+Wwj+eoiyIsCiAgInNob3J0X25hbWUiOiAi6K6h5oCB5biy6KeBIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwYzEwMTUiLAogICJ0aGVtZV9jb2xvciI6ICIjMGMxMDE1Igp9">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0c1015;
            --bg-secondary: #131920;
            --card: #1a222c;
            --card-hover: #232d3a;
            --border: #2a3544;
            --accent: #00d4aa;
            --accent-hover: #00b894;
            --accent-soft: rgba(0, 212, 170, 0.12);
            --warning: #ffa726;
            --danger: #ff5252;
            --info: #42a5f5;
            --purple: #ab47bc;
            --important: #ff5252;
            --normal: #607d8b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        html { height: -webkit-fill-available; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Space Grotesk', sans-serif; }
        ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }

        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                radial-gradient(ellipse 100% 60% at 50% -30%, rgba(0, 212, 170, 0.06), transparent),
                radial-gradient(circle at 80% 80%, rgba(66, 165, 245, 0.04), transparent 50%);
            pointer-events: none;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
            z-index: 1;
            padding-top: var(--safe-area-top);
            padding-bottom: var(--safe-area-bottom);
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(12, 16, 21, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .app-body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            height: 60px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item-mobile {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 10px;
            gap: 4px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item-mobile.active { color: var(--accent); }
        .nav-item-mobile svg { width: 24px; height: 24px; }

        .view {
            display: none;
            padding: 16px;
            animation: fadeIn 0.2s ease;
        }
        
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            width: 100%;
        }
        
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #0c1015; }
        .btn-secondary { background: var(--card-hover); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: rgba(255, 82, 82, 0.15); color: var(--danger); border: 1px solid rgba(255, 82, 82, 0.3); }
        .btn-small { padding: 8px 16px; font-size: 13px; width: auto; }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 12px;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .home-list-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .home-list-item:last-child { border-bottom: none; }
        .home-list-item:active { background: var(--card-hover); }

        .home-list-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .home-list-row:first-child {
            margin-bottom: 6px;
        }

        .home-client-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
        }

        .home-date {
            font-size: 13px;
            font-weight: 500;
        }

        .home-purpose {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .tag-pending { background: rgba(255, 167, 38, 0.15); color: var(--warning); }
        .tag-done { background: rgba(0, 212, 170, 0.15); color: var(--accent); }
        .tag-missed { background: rgba(255, 82, 82, 0.15); color: var(--danger); }
        .tag-reschedule { background: rgba(66, 165, 245, 0.15); color: var(--info); }

        .date-today { color: var(--warning); }
        .date-overdue { color: var(--danger); }
        .date-normal { color: var(--text-muted); }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .calendar-day {
            background: var(--card);
            aspect-ratio: 1;
            padding: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .calendar-day.active { background: var(--accent-soft); }
        .calendar-day.today { border: 1px solid var(--accent); }
        
        .day-num { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
        
        .visit-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-top: 1px;
        }

        .view-switcher {
            display: flex;
            background: var(--bg);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 16px;
        }
        .view-switcher-btn {
            flex: 1;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .view-switcher-btn.active {
            background: var(--accent);
            color: #0c1015;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
        }
        
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--bg-secondary);
            width: 100%;
            max-height: 90vh;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 12px auto;
        }

        .modal-header {
            padding: 0 20px 16px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }

        .modal-footer {
            padding: 16px 20px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        .modal-footer .btn { flex: 1; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        
        .status-group {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .status-options {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .status-option {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid var(--border);
            color: var(--text-muted);
            transition: all 0.2s;
        }
        
        .status-option.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
        .status-option.active.done { border-color: var(--accent); color: var(--accent); }
        .status-option.active.reschedule { border-color: var(--info); color: var(--info); background: rgba(66, 165, 245, 0.1); }
        .status-option.active.missed { border-color: var(--danger); color: var(--danger); background: rgba(255, 82, 82, 0.1); }

        .required-star { color: var(--danger); margin-left: 2px; }
        
        .ind-row {
            display: flex;
            align-items: center;
            padding: 8px;
            background: var(--card);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .ind-row input { background: transparent; border: none; color: var(--text); width: 100%; }
        .ind-row input:focus { outline: none; }

        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }
        
        .filter-chip {
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        
        .filter-chip.active {
            background: var(--accent);
            color: #0c1015;
            border-color: var(--accent);
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .history-item:last-child { border-bottom: none; }
        
        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .action-row .btn {
            flex: 1;
        }

        .stat-card-clickable {
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .stat-card-clickable:active {
            transform: scale(0.98);
            background: var(--card-hover);
        }

        .follow-up-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .follow-up-btn {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-muted);
            transition: all 0.2s;
        }
        
        .follow-up-btn.active {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: var(--accent);
        }
        
        .follow-up-btn.stop.active {
            background: rgba(255, 82, 82, 0.1);
            color: var(--danger);
            border-color: var(--danger);
        }
        
        .follow-up-content {
            display: none;
        }
        
        .follow-up-content.show {
            display: block;
        }

    </style>
</head>
<body>

    <div class="bg-pattern"></div>
    
    <div class="app-shell">
        <header class="app-header">
            <div class="header-inner">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #00b894); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0c1015" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    </div>
                    <span class="header-title" id="pageTitle">拜访日历</span>
                </div>
                <div style="font-size: 13px; color: var(--text-muted);" id="todayDate"></div>
            </div>
        </header>

        <main class="app-body">
            <!-- Dashboard View -->
            <div class="view" id="view-home">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
                    <!-- 客户总数 -->
                    <div class="card stat-card-clickable" style="background: var(--card); border:none; border-radius:16px; margin:0;" onclick="navigate('clients')">
                        <div style="padding: 16px; display: flex; align-items: center; gap: 16px;">
                            <div style="width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: var(--accent-soft); color: var(--accent); font-weight: 600; font-size: 20px;">
                                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                            </div>
                            <div>
                                <div style="font-size: 24px; font-weight: 700;" id="statClients">0</div>
                                <div style="font-size: 12px; color: var(--text-muted);">客户总数</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 待拜访统计 -->
                    <div class="card" style="background: var(--card); border:none; border-radius:16px; margin:0;">
                         <div style="padding: 16px; display: flex; align-items: center; gap: 16px;">
                            <div style="width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(255, 167, 38, 0.15); color: var(--warning); font-weight: 600; font-size: 20px;">
                                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            </div>
                            <div style="flex: 1;">
                                <div style="font-size: 24px; font-weight: 700;" id="statPending">0</div>
                                <div style="font-size: 12px; color: var(--text-muted);">待拜访</div>
                                <div id="overdue-warning" style="display: none; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);">
                                    <div style="display: flex; align-items: center; justify-content: space-between;">
                                        <span style="font-size: 12px; font-weight: 600; color: var(--danger);">
                                            含 <span id="statOverdue">0</span> 个已过期
                                        </span>
                                        <button class="btn btn-danger btn-small" style="padding: 2px 8px; font-size: 11px; height: auto; width: auto;" onclick="event.stopPropagation(); toggleHomeFilter(true)">查看</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 列表标题 -->
                <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 style="font-size: 16px; margin-bottom: 4px;" id="home-list-title">近期计划</h3>
                        <!-- 显示完整日期和当天待拜访数目 -->
                        <div style="font-size: 13px; color: var(--text-muted);" id="home-date-info"></div>
                    </div>
                    <button id="btn-clear-filter" class="btn btn-secondary btn-small" style="display: none;" onclick="toggleHomeFilter(false)">返回全部</button>
                </div>

                <div class="card" style="padding: 0;">
                    <div id="home-visits" style="min-height: 200px;"></div>
                </div>
            </div>

            <!-- Clients View -->
            <div class="view" id="view-clients">
                <div style="position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 12px;">
                    <div id="client-filter-bar" class="filter-bar"></div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" class="form-input" placeholder="搜索客户..." id="clientSearch" oninput="renderClients()" style="margin-bottom: 0; flex: 1;">
                        <button class="btn btn-primary" onclick="openModal('client')" style="width: auto; padding: 0 16px; white-space: nowrap;">新增</button>
                    </div>
                    <div class="action-row">
                        <button class="btn btn-secondary btn-small" onclick="exportClients()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            导出客户清单
                        </button>
                    </div>
                </div>
                <div id="clients-list" style="padding-bottom: 80px;"></div>
            </div>

            <!-- Calendar View -->
            <div class="view active" id="view-calendar">
                <div class="view-switcher">
                    <div class="view-switcher-btn active" data-mode="month">月</div>
                    <div class="view-switcher-btn" data-mode="week">周</div>
                    <div class="view-switcher-btn" data-mode="day">日</div>
                </div>

                <div id="cal-container-month">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <button class="btn btn-secondary btn-small" onclick="changeMonth(-1)"><</button>
                        <h3 style="font-size: 16px;" id="calTitle"></h3>
                        <button class="btn btn-secondary btn-small" onclick="changeMonth(1)">></button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>

                <div id="cal-container-week" style="display:none;">
                     <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <button class="btn btn-secondary btn-small" onclick="changeWeek(-1)"><</button>
                        <h3 style="font-size: 16px;" id="calTitleWeek"></h3>
                        <button class="btn btn-secondary btn-small" onclick="changeWeek(1)">></button>
                    </div>
                    <div id="weekList"></div>
                </div>

                <div id="cal-container-day" style="display:none;">
                     <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <button class="btn btn-secondary btn-small" onclick="changeDay(-1)"><</button>
                        <h3 style="font-size: 16px;" id="calTitleDay"></h3>
                        <button class="btn btn-secondary btn-small" onclick="changeDay(1)">></button>
                    </div>
                    <div id="dayList"></div>
                    <button class="btn btn-primary" style="margin-top: 20px;" onclick="openModal('visit', null, getSelectedDayStr())">添加今日拜访</button>
                </div>
            </div>

            <!-- Records View -->
            <div class="view" id="view-records">
                <div style="position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 12px;">
                    <div id="record-filter-bar"></div>
                    <div class="action-row" style="margin-top:0; margin-bottom: 0px;">
                         <button class="btn btn-secondary btn-small" onclick="exportVisits()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            导出拜访履历
                        </button>
                    </div>
                </div>
                <div id="records-list" style="padding-bottom: 80px;"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item-mobile" data-view="home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>首页</span>
            </div>
            <div class="nav-item-mobile" data-view="clients">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>客户</span>
            </div>
            <div class="nav-item-mobile" onclick="openModal('visit')" style="position: relative; top: -10px;">
                 <div style="width: 56px; height: 56px; background: var(--accent); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(0,212,170,0.3);">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0c1015" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
            </div>
            <div class="nav-item-mobile active" data-view="calendar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>日历</span>
            </div>
            <div class="nav-item-mobile" data-view="records">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>记录</span>
            </div>
        </nav>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <span id="modalHeader">标题</span>
                <button onclick="closeModal()" style="background:none; border:none; color:var(--text-muted); font-size:20px;">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modalSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'crm-v24'; 
                self.addEventListener('fetch', event => {
                    event.respondWith(fetch(event.request).catch(() => caches.match(event.request)));
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW Skip'));
        }
    </script>

    <script>
        // --- App State ---
        let data = { clients: [], industries: [], visits: [], records: [] };
        let currentMonth = new Date();
        let currentWeek = new Date();
        let currentDay = new Date();
        let calendarMode = 'month';
        let activeClientFilter = 'all';
        let activeRecordFilter = 'all'; 
        let homeFilterOverdue = false;

        // --- Data Management ---
        const loadData = () => {
            const stored = localStorage.getItem('crm_app_data_v3');
            if (stored) data = JSON.parse(stored);
            else {
                data.industries = [
                    { id: 1, name: '制造业' },
                    { id: 2, name: 'IT互联网' },
                    { id: 3, name: '金融' },
                    { id: 4, name: '医疗健康' }
                ];
                data.clients = [
                    { id: 1, name: '示例客户', contact: '张总', industryId: 2, level: 'important', notes: '重点客户', avatar: '示' },
                ];
                data.visits = [
                    { id: 1, clientId: 1, date: getTodayStr(), status: 'pending', notes: '初次拜访', detail: '', nextDate: '', nextGoal: '', stopReason: '' }
                ];
                saveData();
            }
        };

        const saveData = () => localStorage.setItem('crm_app_data_v3', JSON.stringify(data));

        // --- Export Functions ---
        const exportClients = () => {
            if(data.clients.length === 0) return alert('暂无客户数据可导出');
            
            const headers = ['客户名称', '联系人', '行业', '重点程度', '备注'];
            const rows = data.clients.map(c => {
                const ind = data.industries.find(i => i.id === c.industryId);
                return [
                    `"${c.name}"`, 
                    `"${c.contact || ''}"`, 
                    `"${ind?.name || '未分类'}"`, 
                    `"${c.level === 'important' ? '重要' : '一般'}"`, 
                    `"${(c.notes || '').replace(/"/g, '""')}"`
                ];
            });
            
            downloadCSV('客户清单.csv', headers, rows);
        };

        const exportVisits = () => {
            if(data.visits.length === 0) return alert('暂无拜访数据可导出');
            
            const headers = ['日期', '客户名称', '状态', '计划说明', '执行详情', '下次跟进日', '跟进目标', '不再跟进原因'];
            const statusMap = { pending: '待拜访', done: '已拜访', missed: '未拜访', reschedule: '已改期' };
            
            const rows = data.visits.map(v => {
                const client = data.clients.find(c => c.id === v.clientId);
                return [
                    `"${v.date}"`,
                    `"${client?.name || '未知'}"`,
                    `"${statusMap[v.status] || v.status}"`,
                    `"${(v.notes || '').replace(/"/g, '""')}"`,
                    `"${(v.detail || '').replace(/"/g, '""')}"`,
                    `"${v.nextDate || ''}"`,
                    `"${(v.nextGoal || '').replace(/"/g, '""')}"`,
                    `"${(v.stopReason || '').replace(/"/g, '""')}"`
                ];
            });

            downloadCSV('拜访履历.csv', headers, rows);
        };

        const downloadCSV = (filename, headers, rows) => {
            const BOM = "\uFEFF";
            const csvContent = BOM + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // --- Render Home ---
        const renderHome = () => {
            const today = getTodayStr();
            
            const allPending = data.visits.filter(v => v.status === 'pending');
            const overdue = allPending.filter(v => v.date < today);
            const todayVisits = allPending.filter(v => v.date === today);
            const upcoming = allPending.filter(v => v.date > today);

            // 统计数据
            document.getElementById('statClients').innerText = data.clients.length;
            document.getElementById('statPending').innerText = allPending.length;
            document.getElementById('todayDate').innerText = new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });

            // 过期提醒
            const warnEl = document.getElementById('overdue-warning');
            if (overdue.length > 0) {
                warnEl.style.display = 'block';
                document.getElementById('statOverdue').innerText = overdue.length;
            } else {
                warnEl.style.display = 'none';
            }

            // 日期信息 - 显示完整日期和当天待拜访数目
            const now = new Date();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekday = weekdays[now.getDay()];
            const todayCount = todayVisits.length;

            document.getElementById('home-date-info').innerText = `今天是${month}月${date}日 星期${weekday}，有${todayCount}个待拜访`;

            // 渲染列表
            let displayList = [];
            
            if (homeFilterOverdue) {
                displayList = overdue;
                document.getElementById('home-list-title').innerText = "已过期未反馈";
                document.getElementById('home-list-title').style.color = "var(--danger)";
                document.getElementById('btn-clear-filter').style.display = "block";
            } else {
                displayList = [...overdue, ...todayVisits, ...upcoming];
                document.getElementById('home-list-title').innerText = "近期计划";
                document.getElementById('home-list-title').style.color = "var(--text)";
                document.getElementById('btn-clear-filter').style.display = "none";
            }

            const container = document.getElementById('home-visits');
            if (displayList.length === 0) {
                container.innerHTML = homeFilterOverdue 
                    ? '<div class="empty-state">没有过期的拜访记录</div>' 
                    : '<div class="empty-state">暂无待办事项</div>';
            } else {
                container.innerHTML = displayList.map(v => {
                    const client = data.clients.find(c => c.id === v.clientId);
                    
                    const isToday = v.date === today;
                    const isOverdue = v.date < today;
                    
                    // 日期显示和样式
                    let dateText = '';
                    let dateClass = 'date-normal';
                    
                    if (isToday) {
                        dateText = '今天';
                        dateClass = 'date-today';
                    } else if (isOverdue) {
                        dateText = '已过期';
                        dateClass = 'date-overdue';
                    } else {
                        dateText = v.date.substring(5).replace('-', '/');
                    }
                    
                    return `
                        <div class="home-list-item" onclick="openFeedbackModal(${v.id})">
                            <!-- 第一行：客户名称 + 状态 + 履历按钮 -->
                            <div class="home-list-row">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span class="home-client-name">${client?.name || '未知'}</span>
                                    <span class="tag tag-pending">待拜访</span>
                                </div>
                                <button class="btn btn-secondary btn-small" style="padding: 4px 10px; font-size: 11px;" onclick="event.stopPropagation(); openModal('history', ${v.clientId})">履历</button>
                            </div>
                            <!-- 第二行：日期（带颜色） + 拜访目的 -->
                            <div class="home-list-row">
                                <div style="display: flex; align-items: center;">
                                    <span class="home-date ${dateClass}">${dateText}</span>
                                    <span class="home-purpose">${v.notes || '无备注'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        };

        // 打开反馈弹窗
        window.openFeedbackModal = function(visitId) {
            const visit = data.visits.find(v => v.id === visitId);
            const client = data.clients.find(c => c.id === visit.clientId);
            
            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            const header = document.getElementById('modalHeader');
            const saveBtn = document.getElementById('modalSaveBtn');
            
            header.innerText = `反馈 - ${client?.name || '未知'}`;
            
            // 判断当前状态
            const hasStopReason = visit.stopReason && visit.stopReason.trim();
            const defaultContinue = !hasStopReason;
            
            body.innerHTML = `
                <div style="margin-bottom: 16px; padding: 12px; background: var(--bg); border-radius: 12px;">
                    <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">计划时间: ${visit.date}</div>
                    <div style="font-size: 13px; color: var(--text);">${visit.notes || '无备注'}</div>
                </div>

                <label style="font-size: 12px; color: var(--text-muted);">拜访状态</label>
                <div class="status-options" style="margin-bottom: 16px;">
                    <div class="status-option active done" onclick="setFeedbackStatus('done')">已拜访</div>
                    <div class="status-option" onclick="setFeedbackStatus('reschedule')">改期</div>
                    <div class="status-option" onclick="setFeedbackStatus('missed')">未拜访</div>
                </div>
                <input type="hidden" id="fb_status" value="done">

                <div id="fb_detail_container">
                    <label style="font-size: 12px; color: var(--text-muted);" id="fb_detail_label">拜访详情</label>
                    <textarea class="form-input" id="fb_detail" style="margin-top:8px; margin-bottom: 16px;" placeholder="记录本次拜访成果...">${visit.detail || ''}</textarea>
                </div>

                <label style="font-size: 12px; color: var(--text-muted); display:block; margin-bottom:8px;">后续安排</label>
                <div class="follow-up-toggle" style="margin-bottom: 12px;">
                    <div class="follow-up-btn ${defaultContinue ? 'active' : ''}" id="fb_btn_continue" onclick="toggleFeedbackFollowUp('continue')">继续跟进</div>
                    <div class="follow-up-btn stop ${!defaultContinue ? 'active' : ''}" id="fb_btn_stop" onclick="toggleFeedbackFollowUp('stop')">不再跟进</div>
                </div>
                
                <div class="follow-up-content ${defaultContinue ? 'show' : ''}" id="fb_content_continue">
                    <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                        <input type="date" class="form-input" id="fb_next_date" style="flex: 1; margin-bottom: 0;" value="${visit.nextDate || ''}">
                    </div>
                    <input type="text" class="form-input" id="fb_next_goal" style="margin-bottom: 0;" value="${visit.nextGoal || ''}" placeholder="跟进目标">
                </div>
                
                <div class="follow-up-content ${!defaultContinue ? 'show' : ''}" id="fb_content_stop">
                    <textarea class="form-input" id="fb_stop_reason" style="margin-bottom: 0; height: 80px;" placeholder="请填写不再跟进的原因（必填）">${visit.stopReason || ''}</textarea>
                </div>

                <div id="fb_reschedule_field" style="display: none; margin-top: 16px;">
                    <label style="font-size: 12px; color: var(--text-muted);">改期至</label>
                    <input type="date" class="form-input" id="fb_reschedule_date" value="${visit.date}">
                </div>
            `;
            
            // 绑定状态切换
            window.setFeedbackStatus = (status) => {
                document.getElementById('fb_status').value = status;
                
                document.querySelectorAll('.status-option').forEach(el => {
                    el.classList.remove('active', 'done', 'reschedule', 'missed');
                });
                
                const activeBtn = document.querySelector(`.status-option[onclick="setFeedbackStatus('${status}')"]`);
                if (activeBtn) {
                    activeBtn.classList.add('active');
                    if(status === 'done') activeBtn.classList.add('done');
                    if(status === 'reschedule') activeBtn.classList.add('reschedule');
                    if(status === 'missed') activeBtn.classList.add('missed');
                }

                const detailLabel = document.getElementById('fb_detail_label');
                const detailInput = document.getElementById('fb_detail');
                const rescheduleField = document.getElementById('fb_reschedule_field');
                
                if (status === 'missed') {
                    detailLabel.innerHTML = '未拜访原因 <span class="required-star">*</span>';
                    detailInput.placeholder = '请填写未拜访原因（必填）';
                    rescheduleField.style.display = 'none';
                } else if (status === 'reschedule') {
                    detailLabel.innerText = '改期原因';
                    detailInput.placeholder = '请填写改期原因...';
                    rescheduleField.style.display = 'block';
                } else {
                    detailLabel.innerText = '拜访详情';
                    detailInput.placeholder = '记录本次拜访成果...';
                    rescheduleField.style.display = 'none';
                }
            };
            
            window.toggleFeedbackFollowUp = (type) => {
                const btnContinue = document.getElementById('fb_btn_continue');
                const btnStop = document.getElementById('fb_btn_stop');
                const contentContinue = document.getElementById('fb_content_continue');
                const contentStop = document.getElementById('fb_content_stop');
                
                if (type === 'continue') {
                    btnContinue.classList.add('active');
                    btnStop.classList.remove('active');
                    contentContinue.classList.add('show');
                    contentStop.classList.remove('show');
                } else {
                    btnContinue.classList.remove('active');
                    btnStop.classList.add('active');
                    contentContinue.classList.remove('show');
                    contentStop.classList.add('show');
                }
            };
            
            // 保存按钮逻辑
            saveBtn.onclick = () => {
                const status = document.getElementById('fb_status').value;
                const detail = document.getElementById('fb_detail').value;
                
                if (status === 'missed' && !detail.trim()) {
                    return alert('请填写未拜访原因');
                }
                
                visit.status = status;
                visit.detail = detail;
                
                if (status === 'done') {
                    const isContinue = document.getElementById('fb_btn_continue').classList.contains('active');
                    
                    if (isContinue) {
                        visit.nextDate = document.getElementById('fb_next_date').value;
                        visit.nextGoal = document.getElementById('fb_next_goal').value;
                        visit.stopReason = '';
                        
                        if (visit.nextDate) {
                            data.visits.push({
                                id: Date.now() + 1,
                                clientId: visit.clientId,
                                date: visit.nextDate,
                                status: 'pending',
                                notes: `跟进: ${visit.nextGoal || ''}`,
                                detail: '', 
                                nextDate: '', 
                                nextGoal: '',
                                stopReason: ''
                            });
                        }
                    } else {
                        const stopReason = document.getElementById('fb_stop_reason').value;
                        if (!stopReason.trim()) return alert('请填写不再跟进的原因');
                        visit.stopReason = stopReason;
                        visit.nextDate = '';
                        visit.nextGoal = '';
                    }
                } else if (status === 'reschedule') {
                    const newDate = document.getElementById('fb_reschedule_date').value;
                    if(newDate) visit.date = newDate;
                    visit.status = 'pending';
                }
                
                saveData();
                closeModal();
                renderHome();
                renderCalendar();
                renderRecords();
            };
            
            saveBtn.innerText = '保存';
            document.querySelector('.modal-footer .btn-secondary').innerText = '取消';
            
            overlay.classList.add('active');
        };

        // 切换首页筛选
        const toggleHomeFilter = (showOverdue) => {
            homeFilterOverdue = showOverdue;
            renderHome();
        };

        // --- Render Clients ---
        const renderClients = () => {
            const today = getTodayStr();
            
            const filterContainer = document.getElementById('client-filter-bar');
            const counts = { all: data.clients.length };
            data.industries.forEach(ind => {
                counts[ind.id] = data.clients.filter(c => c.industryId === ind.id).length;
            });

            let filterHtml = `<div class="filter-chip ${activeClientFilter === 'all' ? 'active' : ''}" onclick="setClientFilter('all')">全部 (${counts.all})</div>`;
            filterHtml += data.industries.map(ind => 
                `<div class="filter-chip ${activeClientFilter === ind.id ? 'active' : ''}" onclick="setClientFilter(${ind.id})">${ind.name} (${counts[ind.id] || 0})</div>`
            ).join('');
            filterContainer.innerHTML = filterHtml;

            const search = document.getElementById('clientSearch').value.toLowerCase();
            const filtered = data.clients.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(search);
                const matchFilter = (activeClientFilter === 'all' || c.industryId === activeClientFilter);
                return matchSearch && matchFilter;
            });

            const listHtml = filtered.map(c => {
                const ind = data.industries.find(i => i.id === c.industryId);
                const levelTag = c.level === 'important' ? '<span class="tag tag-pending">重要</span>' : '<span class="tag" style="background: rgba(96, 125, 139, 0.15); color: #607d8b;">一般</span>';
                
                const nextVisit = data.visits.find(v => v.clientId === c.id && v.status === 'pending' && v.date >= today);
                const nextVisitHtml = nextVisit 
                    ? `<span style="color:var(--accent); margin-left:8px; font-size:12px; font-weight:500;">计划: ${nextVisit.date}</span>` 
                    : '';

                return `
                    <div class="card" style="margin-bottom: 12px;">
                        <div style="display: flex; align-items: center; padding: 16px;" onclick="openModal('client', ${c.id})">
                            <div style="width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: var(--card-hover); color: var(--text); font-weight: 600; font-size: 16px; margin-right: 12px;">${c.avatar}</div>
                            <div style="flex: 1">
                                <div style="display: flex; align-items: center;">
                                    <div style="font-weight: 600;">${c.name} ${levelTag}</div>
                                    ${nextVisitHtml}
                                </div>
                                <div style="display: flex; gap: 8px; font-size: 12px; color: var(--text-muted); margin-top:4px;">
                                    <span>${ind?.name || '未分类'}</span>
                                    <span>|</span>
                                    <span>${c.contact || '暂无联系'}</span>
                                </div>
                            </div>
                        </div>
                        <div style="border-top: 1px solid var(--border); padding: 8px 16px; display: flex; justify-content: flex-end;">
                            <button class="btn btn-small btn-secondary" style="padding: 4px 12px; font-size: 12px;" onclick="event.stopPropagation(); openModal('history', ${c.id})">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                履历
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('clients-list').innerHTML = listHtml || '<div class="empty-state">无客户数据</div>';
        };

        const setClientFilter = (id) => {
            activeClientFilter = id;
            renderClients();
        };

        // --- Render Calendar ---
        const renderCalendar = () => {
            if (calendarMode === 'month') renderMonthView();
            else if (calendarMode === 'week') renderWeekView();
            else if (calendarMode === 'day') renderDayView();
            
            document.querySelectorAll('.view-switcher-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === calendarMode);
            });
        };

        const renderMonthView = () => {
            document.getElementById('cal-container-month').style.display = 'block';
            document.getElementById('cal-container-week').style.display = 'none';
            document.getElementById('cal-container-day').style.display = 'none';

            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            document.getElementById('calTitle').innerText = `${year}年 ${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = ['日', '一', '二', '三', '四', '五', '六'].map(d => `<div style="text-align: center; font-size: 12px; color: var(--text-dim); padding: 8px 0; background:var(--bg-secondary)">${d}</div>`).join('');
            
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="calendar-day" style="background: var(--bg-secondary); opacity:0.3"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayVisits = data.visits.filter(v => v.date === dateStr);
                const isToday = dateStr === getTodayStr();
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''}" onclick="handleDayClick('${dateStr}')">
                        <div class="day-num" style="${isToday ? 'color: var(--accent); font-weight:700' : ''}">${d}</div>
                        <div style="display: flex; gap: 2px; justify-content: center; flex-wrap: wrap;">
                            ${dayVisits.slice(0, 3).map(v => {
                                let color = '#ffa726';
                                if(v.status === 'done') color = '#00d4aa';
                                if(v.status === 'missed') color = '#ff5252';
                                if(v.status === 'reschedule') color = '#42a5f5';
                                return `<div class="visit-dot" style="background: ${color}"></div>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            document.getElementById('calendarGrid').innerHTML = html;
        };

        const renderWeekView = () => {
            document.getElementById('cal-container-month').style.display = 'none';
            document.getElementById('cal-container-week').style.display = 'block';
            document.getElementById('cal-container-day').style.display = 'none';

            const startOfWeek = new Date(currentWeek);
            startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());

            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(endOfWeek.getDate() + 6);

            document.getElementById('calTitleWeek').innerText = `${(startOfWeek.getMonth()+1)}/${startOfWeek.getDate()} - ${(endOfWeek.getMonth()+1)}/${endOfWeek.getDate()}`;

            let html = '';
            for(let i=0; i<7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(d.getDate() + i);
                const dateStr = formatObjToStr(d);
                const dayVisits = data.visits.filter(v => v.date === dateStr);
                
                html += `
                    <div class="card" style="margin-bottom: 8px;">
                        <div style="display: flex; align-items: center; padding: 12px 16px; border-bottom: ${dayVisits.length > 0 ? '1px solid var(--border)' : 'none'};">
                            <div style="font-weight: 600; width: 40px; color: ${dateStr === getTodayStr() ? 'var(--accent)' : 'inherit'}">${['日','一','二','三','四','五','六'][d.getDay()]}</div>
                            <div style="color: var(--text-muted); font-size: 13px;">${d.getDate()}日</div>
                            <button class="btn btn-small btn-secondary" style="margin-left:auto; padding: 4px 8px; font-size: 11px;" onclick="openModal('visit', null, '${dateStr}')">+</button>
                        </div>
                        <div>
                            ${dayVisits.map(v => renderVisitItem(v)).join('')}
                        </div>
                    </div>
                `;
            }
            document.getElementById('weekList').innerHTML = html;
        };

        const renderDayView = () => {
            document.getElementById('cal-container-month').style.display = 'none';
            document.getElementById('cal-container-week').style.display = 'none';
            document.getElementById('cal-container-day').style.display = 'block';

            const dateStr = formatObjToStr(currentDay);
            document.getElementById('calTitleDay').innerText = `${currentDay.getMonth()+1}月${currentDay.getDate()}日`;

            const dayVisits = data.visits.filter(v => v.date === dateStr);
            
            let html = '';
            if(dayVisits.length === 0) html = '<div class="empty-state">暂无安排</div>';
            else html = dayVisits.map(v => renderVisitItem(v)).join('');

            document.getElementById('dayList').innerHTML = `<div class="card">${html}</div>`;
        };

        const renderVisitItem = (v) => {
            const client = data.clients.find(c => c.id === v.clientId);
            let statusClass = 'tag-pending';
            let statusText = '待拜访';
            if(v.status === 'done') { statusClass = 'tag-done'; statusText = '已拜访'; }
            if(v.status === 'missed') { statusClass = 'tag-missed'; statusText = '未拜访'; }
            if(v.status === 'reschedule') { statusClass = 'tag-reschedule'; statusText = '已改期'; }

            return `
                <div style="display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer;" onclick="openModal('visit_edit', ${v.id})">
                    <div style="flex:1">
                        <div style="font-weight: 500">${client?.name || '未知'}</div>
                        <div style="font-size: 12px; color: var(--text-muted)">${v.notes || '无备注'}</div>
                    </div>
                    <span class="tag ${statusClass}">${statusText}</span>
                </div>
            `;
        };

        const handleDayClick = (dateStr) => {
            switchCalendarMode('day');
            currentDay = new Date(dateStr.replace(/-/g, '/'));
            renderCalendar();
        };
        
        const switchCalendarMode = (mode) => {
            calendarMode = mode;
            renderCalendar();
        };

        const changeMonth = (delta) => {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderMonthView();
        };

        const changeWeek = (delta) => {
            currentWeek.setDate(currentWeek.getDate() + (7 * delta));
            renderWeekView();
        };

        const changeDay = (delta) => {
            currentDay.setDate(currentDay.getDate() + delta);
            renderDayView();
        };

        const getSelectedDayStr = () => formatObjToStr(currentDay);

        // --- Records ---
        const renderRecords = () => {
            const filterWrapper = document.getElementById('record-filter-bar');
            const clientOptions = data.clients.map(c => 
                `<option value="${c.id}" ${activeRecordFilter == c.id ? 'selected' : ''}>${c.name}</option>`
            ).join('');

            filterWrapper.innerHTML = `
                <select class="form-select" onchange="filterRecords(this.value)" style="margin-bottom: 8px;">
                    <option value="all" ${activeRecordFilter === 'all' ? 'selected' : ''}>筛选：全部客户</option>
                    ${clientOptions}
                </select>
            `;

            let filtered = data.visits.filter(v => v.status === 'done');
            if (activeRecordFilter !== 'all') {
                const targetId = parseInt(activeRecordFilter);
                filtered = filtered.filter(v => v.clientId === targetId);
            }

            const sorted = filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
            
            const html = sorted.map(v => {
                const client = data.clients.find(c => c.id === v.clientId);
                
                let followUpInfo = '';
                if (v.stopReason) {
                    followUpInfo = `<div style="margin-top:8px; font-size: 12px; color: var(--danger);">不再跟进: ${v.stopReason}</div>`;
                } else if (v.nextDate) {
                    followUpInfo = `<div style="margin-top:8px; font-size: 12px; color: var(--accent);">下次跟进: ${v.nextDate} - ${v.nextGoal || '无目标'}</div>`;
                }
                
                return `
                    <div class="card" style="margin-bottom: 12px;">
                        <div style="padding: 16px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="font-weight: 600">${client?.name || '未知'}</span>
                                <span style="font-size: 12px; color: var(--text-muted)">${v.date}</span>
                            </div>
                            <div style="font-size: 14px; color: var(--text)">${v.detail || '无详情记录'}</div>
                            ${followUpInfo}
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('records-list').innerHTML = html || '<div class="empty-state">暂无拜访记录</div>';
        };

        const filterRecords = (clientId) => {
            activeRecordFilter = clientId;
            renderRecords();
        };

        // --- Navigation ---
        const navigate = (viewId) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            document.querySelectorAll('.nav-item-mobile').forEach(n => n.classList.remove('active'));
            document.querySelector(`.nav-item-mobile[data-view="${viewId}"]`)?.classList.add('active');

            if (viewId === 'home') {
                homeFilterOverdue = false;
                renderHome();
            }
            if (viewId === 'clients') renderClients();
            if (viewId === 'calendar') renderCalendar();
            if (viewId === 'records') renderRecords();
            
            const titles = { home: '工作台', clients: '客户管理', calendar: '拜访日历', records: '拜访记录' };
            document.getElementById('pageTitle').innerText = titles[viewId];
        };

        // --- Modals ---
        window.openModal = (type, id = null, dateOverride = null, preselectedClient = null) => {
            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            const header = document.getElementById('modalHeader');
            const saveBtn = document.getElementById('modalSaveBtn');
            
            saveBtn.onclick = () => saveModal(type, id);

            if (type === 'client') {
                header.innerText = id ? '编辑客户' : '新增客户';
                let clientData = { name: '', contact: '', notes: '', industryId: '', level: 'normal' };
                if (id) clientData = data.clients.find(c => c.id === id);

                const indOptions = data.industries.map(i => `<option value="${i.id}" ${clientData.industryId === i.id ? 'selected' : ''}>${i.name}</option>`).join('');

                body.innerHTML = `
                    <input type="text" class="form-input" id="c_name" value="${clientData.name}" placeholder="客户名称 *">
                    <input type="text" class="form-input" id="c_contact" value="${clientData.contact || ''}" placeholder="联系人">
                    
                    <label style="font-size: 12px; color: var(--text-muted); display:block; margin-bottom:4px;">行业分类</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <select class="form-select" id="c_industry" style="margin-bottom:0; flex:1"><option value="">未选择</option>${indOptions}</select>
                        <button class="btn btn-secondary btn-small" onclick="openModal('industry')">管理</button>
                    </div>

                    <label style="font-size: 12px; color: var(--text-muted); display:block; margin-top:12px; margin-bottom:4px;">重点程度</label>
                    <select class="form-select" id="c_level" style="margin-bottom: 12px;">
                        <option value="normal" ${clientData.level === 'normal' ? 'selected' : ''}>一般</option>
                        <option value="important" ${clientData.level === 'important' ? 'selected' : ''}>重要</option>
                    </select>

                    <textarea class="form-input" id="c_notes" placeholder="备注">${clientData.notes || ''}</textarea>
                    ${id ? `<button class="btn btn-danger" style="margin-top: 10px;" onclick="deleteClient(${id})">删除客户</button>` : ''}
                `;
            }
            else if (type === 'history') {
                const client = data.clients.find(c => c.id === id);
                const visits = data.visits.filter(v => v.clientId === id).sort((a,b) => new Date(b.date) - new Date(a.date));
                header.innerText = `拜访履历 - ${client?.name || '未知'}`;
                
                body.innerHTML = visits.length === 0 ? '<div class="empty-state">暂无拜访记录</div>' : 
                    visits.map(v => {
                        let statusClass = 'tag-pending', statusText = '待拜访';
                        if(v.status === 'done') { statusClass = 'tag-done'; statusText = '已拜访'; }
                        if(v.status === 'missed') { statusClass = 'tag-missed'; statusText = '未拜访'; }
                        
                        let followUpInfo = '';
                        if (v.stopReason) {
                            followUpInfo = `<div style="font-size:12px; color:var(--danger); margin-top:4px;">不再跟进: ${v.stopReason}</div>`;
                        } else if (v.nextDate) {
                            followUpInfo = `<div style="font-size:12px; color:var(--accent); margin-top:4px;">下次: ${v.nextDate} ${v.nextGoal || ''}</div>`;
                        }
                        
                        return `
                            <div class="history-item">
                                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                    <span style="font-weight:600">${v.date}</span>
                                    <span class="tag ${statusClass}">${statusText}</span>
                                </div>
                                <div style="font-size:13px; color:var(--text-muted)">${v.notes || '无计划备注'}</div>
                                ${v.detail ? `<div style="font-size:13px; color:var(--text); margin-top:4px; padding-top:4px; border-top:1px dashed var(--border);">结果: ${v.detail}</div>` : ''}
                                ${followUpInfo}
                            </div>
                        `;
                    }).join('');
                
                saveBtn.style.display = 'none';
                document.querySelector('.modal-footer .btn-secondary').innerText = '关闭';
                
                overlay.classList.add('active'); 
                return; 
            }
            else if (type === 'industry') {
                header.innerText = '行业管理';
                const list = data.industries.map(i => `
                    <div class="ind-row">
                        <input type="text" value="${i.name}" onchange="updateIndustryName(${i.id}, this.value)">
                        <button onclick="deleteIndustry(${i.id})" style="background:none; border:none; color:var(--danger);">✕</button>
                    </div>
                `).join('');
                
                body.innerHTML = `
                    <div style="margin-bottom: 16px;">${list || '<div style="color:var(--text-muted); text-align:center;">暂无行业</div>'}</div>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="new_industry" class="form-input" placeholder="输入新行业名称" style="margin-bottom:0;">
                        <button class="btn btn-primary btn-small" onclick="addIndustry()">添加</button>
                    </div>
                `;
                saveBtn.innerText = "关闭";
                saveBtn.onclick = () => closeModal();
            } 
            else if (type === 'visit') {
                header.innerText = '新建拜访计划';
                const clientOptions = data.clients.map(c => `<option value="${c.id}" ${c.id === preselectedClient ? 'selected' : ''}>${c.name}</option>`).join('');
                body.innerHTML = `
                    <select class="form-select" id="m_client"><option value="">选择客户 *</option>${clientOptions}</select>
                    <input type="date" class="form-input" id="m_date" value="${dateOverride || getTodayStr()}">
                    <textarea class="form-input" id="m_notes" placeholder="拜访目的..."></textarea>
                `;
            }
            else if (type === 'visit_edit') {
                const visit = data.visits.find(v => v.id === id);
                const client = data.clients.find(c => c.id === visit.clientId);
                header.innerText = '拜访详情';

                const hasStopReason = visit.stopReason && visit.stopReason.trim();
                const defaultContinue = !hasStopReason;

                body.innerHTML = `
                    <div style="margin-bottom: 16px; padding: 12px; background: var(--bg); border-radius: 12px;">
                        <div style="font-weight: 600; margin-bottom: 4px;">${client?.name || '未知'}</div>
                        <div style="font-size: 12px; color: var(--text-muted);">计划时间: ${visit.date}</div>
                    </div>

                    <label style="font-size: 12px; color: var(--text-muted);">当前状态</label>
                    <div class="status-options">
                        <div class="status-option ${visit.status === 'done' ? 'active done' : ''}" onclick="setStatus('done')">已拜访</div>
                        <div class="status-option ${visit.status === 'reschedule' ? 'active reschedule' : ''}" onclick="setStatus('reschedule')">改期</div>
                        <div class="status-option ${visit.status === 'missed' ? 'active missed' : ''}" onclick="setStatus('missed')">未拜访</div>
                    </div>
                    <input type="hidden" id="v_status" value="${visit.status}">

                    <div id="desc_container" style="margin-top: 16px;">
                        <label style="font-size: 12px; color: var(--text-muted);" id="desc_label">情况说明</label>
                        <textarea class="form-input" id="v_detail" style="margin-top:8px; margin-bottom:0;" placeholder="请输入情况说明">${visit.detail || ''}</textarea>
                    </div>

                    <div style="margin-top: 16px;">
                        <label style="font-size: 12px; color: var(--text-muted); display:block; margin-bottom:8px;">后续安排</label>
                        <div class="follow-up-toggle" style="margin-bottom: 12px;">
                            <div class="follow-up-btn ${defaultContinue ? 'active' : ''}" id="modal_btn_continue" onclick="toggleModalFollowUp('continue')">继续跟进</div>
                            <div class="follow-up-btn stop ${!defaultContinue ? 'active' : ''}" id="modal_btn_stop" onclick="toggleModalFollowUp('stop')">不再跟进</div>
                        </div>
                        
                        <div class="follow-up-content ${defaultContinue ? 'show' : ''}" id="modal_content_continue">
                            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                <input type="date" class="form-input" id="v_next_date" style="flex: 1; margin-bottom: 0;" value="${visit.nextDate || ''}">
                            </div>
                            <input type="text" class="form-input" id="v_next_goal" style="margin-bottom: 0;" value="${visit.nextGoal || ''}" placeholder="跟进目标">
                        </div>
                        
                        <div class="follow-up-content ${!defaultContinue ? 'show' : ''}" id="modal_content_stop">
                            <textarea class="form-input" id="v_stop_reason" style="margin-bottom: 0; height: 80px;" placeholder="请填写不再跟进的原因（必填）">${visit.stopReason || ''}</textarea>
                        </div>
                    </div>

                    <div id="reschedule_date_field" style="margin-top: 16px; display: ${visit.status === 'reschedule' ? 'block' : 'none'};">
                         <div class="status-group" style="margin-top:0;">
                            <label style="font-size: 12px; color: var(--text-muted);">改期至</label>
                            <input type="date" class="form-input" id="v_reschedule_date" value="${visit.date}">
                        </div>
                    </div>
                    
                    ${visit.status === 'pending' ? `<button class="btn btn-danger" style="margin-top: 20px;" onclick="deleteVisit(${id})">删除此拜访计划</button>` : ''}
                `;
                
                window.setStatus = (status) => {
                    document.getElementById('v_status').value = status;
                    
                    document.querySelectorAll('.status-option').forEach(el => {
                        el.classList.remove('active', 'done', 'reschedule', 'missed');
                        if(el.getAttribute('onclick').includes(status)) {
                            el.classList.add('active');
                            if(status === 'done') el.classList.add('done');
                            if(status === 'reschedule') el.classList.add('reschedule');
                            if(status === 'missed') el.classList.add('missed');
                        }
                    });

                    document.getElementById('reschedule_date_field').style.display = status === 'reschedule' ? 'block' : 'none';
                    
                    const label = document.getElementById('desc_label');
                    const input = document.getElementById('v_detail');
                    
                    if (status === 'missed') {
                        label.innerHTML = '未拜访原因 <span class="required-star">*</span>';
                        input.placeholder = '请填写未拜访原因（必填）';
                    } else if (status === 'done') {
                        label.innerText = '拜访详情';
                        input.placeholder = '记录本次拜访成果...';
                    } else if (status === 'reschedule') {
                        label.innerText = '改期原因';
                        input.placeholder = '请填写改期原因...';
                    }
                };
                
                window.toggleModalFollowUp = (type) => {
                    const btnContinue = document.getElementById('modal_btn_continue');
                    const btnStop = document.getElementById('modal_btn_stop');
                    const contentContinue = document.getElementById('modal_content_continue');
                    const contentStop = document.getElementById('modal_content_stop');
                    
                    if (type === 'continue') {
                        btnContinue.classList.add('active');
                        btnStop.classList.remove('active');
                        contentContinue.classList.add('show');
                        contentStop.classList.remove('show');
                    } else {
                        btnContinue.classList.remove('active');
                        btnStop.classList.add('active');
                        contentContinue.classList.remove('show');
                        contentStop.classList.add('show');
                    }
                };
                
                window.setStatus(visit.status);
            }

            saveBtn.style.display = 'block';
            document.querySelector('.modal-footer .btn-secondary').innerText = '取消';
            
            overlay.classList.add('active');
        };

        const closeModal = () => document.getElementById('modalOverlay').classList.remove('active');

        // --- Save Logic ---
        const saveModal = (type, id) => {
            if (type === 'client') {
                const name = document.getElementById('c_name').value;
                if (!name) return alert('请填写客户名称');

                const clientData = {
                    name,
                    contact: document.getElementById('c_contact').value,
                    industryId: parseInt(document.getElementById('c_industry').value) || null,
                    level: document.getElementById('c_level').value,
                    notes: document.getElementById('c_notes').value
                };

                let savedClientId;
                if (id) {
                    const c = data.clients.find(x => x.id === id);
                    Object.assign(c, clientData);
                    savedClientId = id;
                } else {
                    savedClientId = Date.now();
                    data.clients.push({ id: savedClientId, ...clientData, avatar: name.charAt(0) });
                }
                saveData();
                closeModal();
                
                setTimeout(() => {
                    if(confirm("客户信息已保存。是否立即添加拜访计划？")) {
                        openModal('visit', null, null, savedClientId);
                    }
                }, 300);
                
                renderClients(); 
                renderHome();
            } 
            else if (type === 'visit') {
                const clientId = parseInt(document.getElementById('m_client').value);
                const date = document.getElementById('m_date').value;
                const notes = document.getElementById('m_notes').value;
                
                if(!clientId || !date) return alert('请选择客户和日期');
                
                const today = getTodayStr();

                if (date < today) {
                    if (!confirm("检测到日期已过，是否补录为【已拜访】记录？\n(补录需填写拜访详情)")) {
                        return;
                    }
                    
                    const header = document.getElementById('modalHeader');
                    const body = document.getElementById('modalBody');
                    const saveBtn = document.getElementById('modalSaveBtn');
                    
                    header.innerText = "补录拜访详情";
                    const clientName = data.clients.find(c => c.id === clientId)?.name || '未知';
                    
                    body.innerHTML = `
                        <div style="margin-bottom: 16px; padding: 12px; background: var(--bg); border-radius: 12px;">
                            <div style="font-weight: 600; margin-bottom: 4px;">客户：${clientName}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">拜访日期：${date}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">计划目的：${notes || '无'}</div>
                        </div>
                        
                        <label style="font-size: 12px; color: var(--text-muted); display:block; margin-bottom:8px;">后续安排</label>
                        <div class="follow-up-toggle" style="margin-bottom: 12px;">
                            <div class="follow-up-btn active" id="backfill_btn_continue" onclick="toggleBackfillFollowUp('continue')">继续跟进</div>
                            <div class="follow-up-btn stop" id="backfill_btn_stop" onclick="toggleBackfillFollowUp('stop')">不再跟进</div>
                        </div>
                        
                        <div class="follow-up-content show" id="backfill_content_continue">
                            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                <input type="date" class="form-input" id="b_next_date" style="flex: 1; margin-bottom: 0;" placeholder="选择日期">
                            </div>
                            <input type="text" class="form-input" id="b_next_goal" style="margin-bottom: 12px;" placeholder="跟进目标">
                        </div>
                        
                        <div class="follow-up-content" id="backfill_content_stop">
                            <textarea class="form-input" id="b_stop_reason" style="margin-bottom: 12px; height: 80px;" placeholder="请填写不再跟进的原因（必填）"></textarea>
                        </div>
                        
                        <label style="font-size: 12px; color: var(--text-muted);">拜访详情 <span class="required-star">*</span></label>
                        <textarea class="form-input" id="b_detail" style="margin-top:8px; height: 100px; margin-bottom:0;" placeholder="请输入本次拜访的详细情况..."></textarea>
                    `;

                    saveBtn.innerText = "保存补录";
                    saveBtn.onclick = () => {
                        const detail = document.getElementById('b_detail').value;
