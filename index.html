<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0c1015">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>客户联系管理 Pro</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167x167.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0c1015;
            --bg-secondary: #131920;
            --card: #1a222c;
            --card-hover: #232d3a;
            --border: #2a3544;
            --accent: #00d4aa;
            --accent-hover: #00b894;
            --accent-soft: rgba(0, 212, 170, 0.12);
            --warning: #ffa726;
            --danger: #ff5252;
            --info: #42a5f5;
            --purple: #ab47bc;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        html { height: -webkit-fill-available; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Space Grotesk', sans-serif; }
        ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }

        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                radial-gradient(ellipse 100% 60% at 50% -30%, rgba(0, 212, 170, 0.06), transparent),
                radial-gradient(circle at 80% 80%, rgba(66, 165, 245, 0.04), transparent 50%);
            pointer-events: none;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
            z-index: 1;
            padding-top: var(--safe-area-top);
            padding-bottom: var(--safe-area-bottom);
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(12, 16, 21, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .app-body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            height: 60px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item-mobile {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 10px;
            gap: 4px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item-mobile.active { color: var(--accent); }
        .nav-item-mobile svg { width: 24px; height: 24px; }

        .view {
            display: none;
            padding: 16px;
            animation: fadeIn 0.2s ease;
        }
        
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            width: 100%;
        }
        
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #0c1015; }
        .btn-secondary { background: var(--card-hover); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: rgba(255, 82, 82, 0.15); color: var(--danger); border: 1px solid rgba(255, 82, 82, 0.3); }
        .btn-small { padding: 8px 16px; font-size: 13px; width: auto; }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 12px;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .home-list-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .home-list-item:last-child { border-bottom: none; }
        .home-list-item:active { background: var(--card-hover); }

        .home-list-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .home-list-row:first-child { margin-bottom: 6px; }

        .home-client-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
        }

        .home-date { font-size: 13px; font-weight: 500; }

        .home-purpose {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .tag-pending { background: rgba(255, 167, 38, 0.15); color: var(--warning); }
        .tag-done { background: rgba(0, 212, 170, 0.15); color: var(--accent); }
        .tag-missed { background: rgba(255, 82, 82, 0.15); color: var(--danger); }
        .tag-reschedule { background: rgba(66, 165, 245, 0.15); color: var(--info); }

        .date-today { color: var(--warning); }
        .date-overdue { color: var(--danger); }
        .date-normal { color: var(--text-muted); }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .calendar-day {
            background: var(--card);
            aspect-ratio: 1;
            padding: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .calendar-day:hover { background: var(--card-hover); }
        .calendar-day.selected { background: var(--accent-soft); border: 2px solid var(--accent); }
        .calendar-day.today { border: 1px solid var(--accent); }
        .calendar-day.today.selected { border: 2px solid var(--accent); }
        
        .day-num { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
        
        .visit-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-top: 1px;
        }

        .view-switcher {
            display: flex;
            background: var(--bg);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 16px;
        }
        
        .view-switcher-btn {
            flex: 1;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .view-switcher-btn.active {
            background: var(--accent);
            color: #0c1015;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
        }
        
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--bg-secondary);
            width: 100%;
            max-height: 90vh;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 12px auto;
        }

        .modal-header {
            padding: 0 20px 16px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }

        .modal-footer {
            padding: 16px 20px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        
        .modal-footer .btn { flex: 1; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        
        .status-group {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .status-options {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .status-option {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid var(--border);
            color: var(--text-muted);
            transition: all 0.2s;
        }
        
        .status-option.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
        .status-option.active.done { border-color: var(--accent); color: var(--accent); }
        .status-option.active.reschedule { border-color: var(--info); color: var(--info); background: rgba(66, 165, 245, 0.1); }
        .status-option.active.missed { border-color: var(--danger); color: var(--danger); background: rgba(255, 82, 82, 0.1); }

        .required-star { color: var(--danger); margin-left: 2px; }
        
        .ind-row {
            display: flex;
            align-items: center;
            padding: 8px;
            background: var(--card);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .ind-row input { background: transparent; border: none; color: var(--text); width: 100%; }
        .ind-row input:focus { outline: none; }

        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }
        
        .filter-chip {
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        
        .filter-chip.active {
            background: var(--accent);
            color: #0c1015;
            border-color: var(--accent);
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .history-item:last-child { border-bottom: none; }
        
        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        
        .action-row .btn { flex: 1; }

        .stat-card-clickable {
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        
        .stat-card-clickable:active {
            transform: scale(0.98);
            background: var(--card-hover);
        }

        .follow-up-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .follow-up-btn {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-muted);
            transition: all 0.2s;
        }
        
        .follow-up-btn.active {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: var(--accent);
        }
        
        .follow-up-btn.stop.active {
            background: rgba(255, 82, 82, 0.1);
            color: var(--danger);
            border-color: var(--danger);
        }
        
        .follow-up-content { display: none; }
        .follow-up-content.show { display: block; }

        .contact-type-options {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .contact-type-option {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-muted);
            transition: all 0.2s;
        }
        
        .contact-type-option.active {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: var(--accent);
        }
        
        .contact-type-option svg {
            width: 20px;
            height: 20px;
            margin-bottom: 4px;
        }

        .pwa-install-toast {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 16px;
            z-index: 300;
            display: none;
            animation: slideUp 0.3s ease;
        }
        
        .pwa-install-toast.show { display: block; }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 月视图选中日期列表样式 */
        .month-selected-date {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        
        .month-selected-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .month-selected-title {
            font-size: 15px;
            font-weight: 600;
        }
        
        .month-selected-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .calendar-visit-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .calendar-visit-item:last-child {
            border-bottom: none;
        }
        
        .calendar-visit-item:active {
            background: var(--card-hover);
        }
        
        .calendar-visit-item.pending-today {
            background: rgba(255, 167, 38, 0.05);
        }
        
        .calendar-visit-item.pending-overdue {
            background: rgba(255, 82, 82, 0.05);
        }
        
        .calendar-visit-item.pending-future {
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="app-shell">
        <header class="app-header">
            <div class="header-inner">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #00b894); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0c1015" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    </div>
                    <span class="header-title" id="pageTitle">联系日历</span>
                </div>
                <div style="font-size: 13px; color: var(--text-muted);" id="todayDate"></div>
            </div>
        </header>

        <main class="app-body">
            <!-- Dashboard View -->
            <div class="view" id="view-home">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
                    <div class="card stat-card-clickable" style="background: var(--card); border:none; border-radius:16px; margin:0;" onclick="navigate('clients')">
                        <div style="padding: 16px; display: flex; align-items: center; gap: 16px;">
                            <div style="width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: var(--accent-soft); color: var(--accent); font-weight: 600; font-size: 20px;">
                                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                            </div>
                            <div>
                                <div style="font-size: 24px; font-weight: 700;" id="statClients">0</div>
                                <div style="font-size: 12px; color: var(--text-muted);">客户总数</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card" style="background: var(--card); border:none; border-radius:16px; margin:0;">
                         <div style="padding: 16px; display: flex; align-items: center; gap: 16px;">
                            <div style="width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(255, 167, 38, 0.15); color: var(--warning); font-weight: 600; font-size: 20px;">
                                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            </div>
                            <div style="flex: 1;">
                                <div style="font-size: 24px; font-weight: 700;" id="statPending">0</div>
                                <div style="font-size: 12px; color: var(--text-muted);">待联系</div>
                                <div id="overdue-warning" style="display: none; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);">
                                    <div style="display: flex; align-items: center; justify-content: space-between;">
                                        <span style="font-size: 12px; font-weight: 600; color: var(--danger);">
                                            含 <span id="statOverdue">0</span> 个已过期
                                        </span>
                                        <button class="btn btn-danger btn-small" style="padding: 2px 8px; font-size: 11px; height: auto; width: auto;" onclick="event.stopPropagation(); toggleHomeFilter(true)">查看</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 style="font-size: 16px; margin-bottom: 4px;" id="home-list-title">近期计划</h3>
                        <div style="font-size: 13px; color: var(--text-muted);" id="home-date-info"></div>
                    </div>
                    <button id="btn-clear-filter" class="btn btn-secondary btn-small" style="display: none;" onclick="toggleHomeFilter(false)">返回全部</button>
                </div>

                <div class="card" style="padding: 0;">
                    <div id="home-visits" style="min-height: 200px;"></div>
                </div>
            </div>

            <!-- Clients View -->
            <div class="view" id="view-clients">
                <div style="position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 12px;">
                    <div id="client-filter-bar" class="filter-bar"></div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" class="form-input" placeholder="搜索客户..." id="clientSearch" oninput="renderClients()" style="margin-bottom: 0; flex: 1;">
                        <!-- 修复：客户列表页新增按钮改为新增客户 -->
                        <button class="btn btn-primary" onclick="openModal('client')" style="width: auto; padding: 0 16px; white-space: nowrap;">新增</button>
                    </div>
                    <div class="action-row">
                        <button class="btn btn-secondary btn-small" onclick="exportClients()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            导出客户清单
                        </button>
                    </div>
                </div>
                <div id="clients-list" style="padding-bottom: 80px;"></div>
            </div>

            <!-- Calendar View -->
            <div class="view active" id="view-calendar">
                <div class="view-switcher">
                    <div class="view-switcher-btn active" data-mode="month">月</div>
                    <div class="view-switcher-btn" data-mode="week">周</div>
                    <div class="view-switcher-btn" data-mode="day">日</div>
                </div>

                <div id="cal-container-month">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <button class="btn btn-secondary btn-small" onclick="changeMonth(-1)"><</button>
                        <h3 style="font-size: 16px;" id="calTitle"></h3>
                        <button class="btn btn-secondary btn-small" onclick="changeMonth(1)">></button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                    
                    <!-- 选中日期联系计划列表 -->
                    <div class="month-selected-date" id="monthSelectedList" style="display: none;">
                        <div class="month-selected-header">
                            <span class="month-selected-title" id="monthSelectedTitle">选中日期</span>
                            <span class="month-selected-count" id="monthSelectedCount">0 个计划</span>
                        </div>
                        <div class="card" style="padding: 0;" id="monthSelectedContent"></div>
                    </div>
                </div>

                <div id="cal-container-week" style="display:none;">
                     <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <button class="btn btn-secondary btn-small" onclick="changeWeek(-1)"><</button>
                        <h3 style="font-size: 16px;" id="calTitleWeek"></h3>
                        <button class="btn btn-secondary btn-small" onclick="changeWeek(1)">></button>
                    </div>
                    <div id="weekList"></div>
                </div>

                <div id="cal-container-day" style="display:none;">
                     <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <button class="btn btn-secondary btn-small" onclick="changeDay(-1)"><</button>
                        <h3 style="font-size: 16px;" id="calTitleDay"></h3>
                        <button class="btn btn-secondary btn-small" onclick="changeDay(1)">></button>
                    </div>
                    <div id="dayList"></div>
                    <button class="btn btn-primary" style="margin-top: 20px;" onclick="openModal('visit', null, getSelectedDayStr())">添加今日联系</button>
                </div>
            </div>

            <!-- Records View -->
            <div class="view" id="view-records">
                <div style="position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 12px;">
                    <div id="record-filter-bar"></div>
                    <div class="action-row" style="margin-top:0; margin-bottom: 0px;">
                         <button class="btn btn-secondary btn-small" onclick="exportVisits()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            导出联系履历
                        </button>
                    </div>
                </div>
                <div id="records-list" style="padding-bottom: 80px;"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item-mobile" data-view="home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>首页</span>
            </div>
            <div class="nav-item-mobile" data-view="clients">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>客户</span>
            </div>
            <div class="nav-item-mobile" onclick="openModal('visit')" style="position: relative; top: -10px;">
                 <div style="width: 56px; height: 56px; background: var(--accent); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(0,212,170,0.3);">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0c1015" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
            </div>
            <div class="nav-item-mobile active" data-view="calendar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>日历</span>
            </div>
            <div class="nav-item-mobile" data-view="records">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>记录</span>
            </div>
        </nav>
    </div>

    <!-- PWA Install Toast -->
    <div class="pwa-install-toast" id="pwaInstallToast">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), #00b894); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0c1015" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
            <div style="flex: 1;">
                <div style="font-weight: 600; margin-bottom: 2px;">添加到主屏幕</div>
                <div style="font-size: 12px; color: var(--text-muted);">像应用一样快速访问</div>
            </div>
            <button class="btn btn-primary btn-small" id="pwaInstallBtn" style="width: auto;">安装</button>
            <button onclick="document.getElementById('pwaInstallToast').classList.remove('show')" style="background: none; border: none; color: var(--text-muted); font-size: 20px; padding: 4px;">&times;</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <span id="modalHeader">标题</span>
                <button onclick="closeModal()" style="background:none; border:none; color:var(--text-muted); font-size:20px;">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modalSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 应用逻辑 -->
    <script>
        // ===== 数据管理 =====
        let data = { clients: [], industries: [], visits: [] };
        let currentMonth = new Date();
        let currentWeek = new Date();
        let currentDay = new Date();
        let calendarMode = 'month';
        let activeClientFilter = 'all';
        let activeRecordFilter = 'all';
        let homeFilterOverdue = false;
        let selectedMonthDate = null; // 月视图选中的日期

        // ===== 全局关闭模态框函数（确保唯一） =====
        window.closeModal = () => {
            document.getElementById('modalOverlay').classList.remove('active');
        };

        const loadData = () => {
            try {
                const stored = localStorage.getItem('crm_app_data_v4');
                if (stored) {
                    data = JSON.parse(stored);
                    // 数据迁移：确保所有记录都有 status 字段
                    data.visits.forEach(v => {
                        if (!v.contactType) v.contactType = '';
                        if (!v.status) v.status = 'pending';
                    });
                } else {
                    initDefaultData();
                }
            } catch (e) {
                console.error('Load data failed:', e);
                initDefaultData();
            }
        };

        const initDefaultData = () => {
            data.industries = [
                { id: 1, name: '制造业' },
                { id: 2, name: 'IT互联网' },
                { id: 3, name: '金融' },
                { id: 4, name: '医疗健康' }
            ];
            data.clients = [
                { id: 1, name: '示例客户', contact: '张总', industryId: 2, level: 'important', notes: '重点客户', avatar: '示' },
            ];
            data.visits = [
                { id: 1, clientId: 1, date: getTodayStr(), status: 'pending', notes: '初次联系', detail: '', nextDate: '', nextGoal: '', stopReason: '', contactType: '' }
            ];
            saveData();
        };

        const saveData = () => {
            try {
                localStorage.setItem('crm_app_data_v4', JSON.stringify(data));
            } catch (e) {
                console.error('Save data failed:', e);
            }
        };

        // ===== 工具函数 =====
        const getTodayStr = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        const formatObjToStr = (d) => {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        // ===== 导出功能 =====
        const exportClients = () => {
            if (data.clients.length === 0) return alert('暂无客户数据可导出');
            const headers = ['客户名称', '联系人', '行业', '重点程度', '备注'];
            const rows = data.clients.map(c => {
                const ind = data.industries.find(i => i.id === c.industryId);
                return [
                    `"${c.name}"`, `"${c.contact || ''}"`, `"${ind?.name || '未分类'}"`,
                    `"${c.level === 'important' ? '重要' : '一般'}"`, `"${(c.notes || '').replace(/"/g, '""')}"`
                ];
            });
            downloadCSV('客户清单.csv', headers, rows);
        };

        const exportVisits = () => {
            const doneVisits = data.visits.filter(v => v.status === 'done');
            if (doneVisits.length === 0) return alert('暂无联系数据可导出');
            const headers = ['日期', '客户名称', '联系方式', '详情', '下次联系', '跟进目标'];
            const contactMap = { phone: '电话', wechat: '微信', visit: '上门', '': '-' };
            const rows = doneVisits.map(v => {
                const c = data.clients.find(x => x.id === v.clientId);
                return [`"${v.date}"`, `"${c?.name || '未知'}"`, `"${contactMap[v.contactType] || '-'}"`,
                    `"${(v.detail || '').replace(/"/g, '""')}"`, `"${v.nextDate || ''}"`, `"${(v.nextGoal || '').replace(/"/g, '""')}"`];
            });
            downloadCSV('联系履历.csv', headers, rows);
        };

        const downloadCSV = (filename, headers, rows) => {
            const BOM = '\uFEFF';
            const csv = BOM + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        };

        // ===== 首页渲染 =====
        const renderHome = () => {
            const today = getTodayStr();
            const allPending = data.visits.filter(v => v.status === 'pending');
            const todayVisits = allPending.filter(v => v.date === today).sort((a,b) => a.date.localeCompare(b.date));
            const overdue = allPending.filter(v => v.date < today).sort((a,b) => a.date.localeCompare(b.date));
            const upcoming = allPending.filter(v => v.date > today).sort((a,b) => a.date.localeCompare(b.date));

            document.getElementById('statClients').innerText = data.clients.length;
            document.getElementById('statPending').innerText = allPending.length;
            document.getElementById('todayDate').innerText = new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });

            const warnEl = document.getElementById('overdue-warning');
            if (overdue.length > 0) {
                warnEl.style.display = 'block';
                document.getElementById('statOverdue').innerText = overdue.length;
            } else {
                warnEl.style.display = 'none';
            }

            const now = new Date();
            document.getElementById('home-date-info').innerText = `今天是${now.getMonth()+1}月${now.getDate()}日，有${todayVisits.length}个待联系`;

            let displayList = homeFilterOverdue ? overdue : [...todayVisits, ...overdue, ...upcoming];
            document.getElementById('home-list-title').innerText = homeFilterOverdue ? '已过期未反馈' : '近期计划';
            document.getElementById('home-list-title').style.color = homeFilterOverdue ? 'var(--danger)' : 'var(--text)';
            document.getElementById('btn-clear-filter').style.display = homeFilterOverdue ? 'block' : 'none';

            const container = document.getElementById('home-visits');
            if (displayList.length === 0) {
                container.innerHTML = `<div class="empty-state">${homeFilterOverdue ? '没有过期的联系记录' : '暂无待办事项'}</div>`;
            } else {
                container.innerHTML = displayList.map(v => {
                    const c = data.clients.find(x => x.id === v.clientId);
                    const isToday = v.date === today;
                    const isOverdue = v.date < today;
                    let dateText = isToday ? '今天' : isOverdue ? '已过期' : v.date.substring(5).replace('-', '/');
                    let dateClass = isToday ? 'date-today' : isOverdue ? 'date-overdue' : 'date-normal';
                    return `
                        <div class="home-list-item" onclick="openFeedbackModal(${v.id})">
                            <div class="home-list-row">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span class="home-client-name">${c?.name || '未知'}</span>
                                    <span class="tag tag-pending">待联系</span>
                                </div>
                                <button class="btn btn-secondary btn-small" style="padding: 4px 10px; font-size: 11px;" onclick="event.stopPropagation(); openModal('history', ${v.clientId})">履历</button>
                            </div>
                            <div class="home-list-row">
                                <div style="display: flex; align-items: center;">
                                    <span class="home-date ${dateClass}">${dateText}</span>
                                    <span class="home-purpose">${v.notes || '无备注'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        };

        window.toggleHomeFilter = (showOverdue) => {
            homeFilterOverdue = showOverdue;
            renderHome();
        };

        // ===== 客户管理 =====
        const renderClients = () => {
            const filterContainer = document.getElementById('client-filter-bar');
            const counts = { all: data.clients.length };
            data.industries.forEach(i => counts[i.id] = data.clients.filter(c => c.industryId === i.id).length);

            let html = `<div class="filter-chip ${activeClientFilter === 'all' ? 'active' : ''}" onclick="setClientFilter('all')">全部 (${counts.all})</div>`;
            html += data.industries.map(i => `<div class="filter-chip ${activeClientFilter === i.id ? 'active' : ''}" onclick="setClientFilter(${i.id})">${i.name} (${counts[i.id] || 0})</div>`).join('');
            filterContainer.innerHTML = html;

            const search = document.getElementById('clientSearch').value.toLowerCase();
            const filtered = data.clients.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(search);
                const matchFilter = activeClientFilter === 'all' || c.industryId === activeClientFilter;
                return matchSearch && matchFilter;
            });

            const today = getTodayStr();
            document.getElementById('clients-list').innerHTML = filtered.map(c => {
                const ind = data.industries.find(i => i.id === c.industryId);
                const levelTag = c.level === 'important' ? '<span class="tag tag-pending">重要</span>' : '<span class="tag" style="background: rgba(96,125,139,0.15); color:#607d8b;">一般</span>';
                const nextVisit = data.visits.find(v => v.clientId === c.id && v.status === 'pending' && v.date >= today);
                const nextHtml = nextVisit ? `<span style="color:var(--accent); margin-left:8px; font-size:12px;">计划: ${nextVisit.date}</span>` : '';
                return `
                    <div class="card" style="margin-bottom: 12px;">
                        <div style="display: flex; align-items: center; padding: 16px;" onclick="openModal('client', ${c.id})">
                            <div style="width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: var(--card-hover); color: var(--text); font-weight: 600; font-size: 16px; margin-right: 12px;">${c.avatar}</div>
                            <div style="flex: 1">
                                <div style="display: flex; align-items: center;">
                                    <div style="font-weight: 600;">${c.name} ${levelTag}</div>
                                    ${nextHtml}
                                </div>
                                <div style="display: flex; gap: 8px; font-size: 12px; color: var(--text-muted); margin-top:4px;">
                                    <span>${ind?.name || '未分类'}</span><span>|</span><span>${c.contact || '暂无联系'}</span>
                                </div>
                            </div>
                        </div>
                        <div style="border-top: 1px solid var(--border); padding: 8px 16px; display: flex; justify-content: flex-end;">
                            <button class="btn btn-small btn-secondary" style="padding: 4px 12px; font-size: 12px;" onclick="event.stopPropagation(); openModal('history', ${c.id})">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                履历
                            </button>
                        </div>
                    </div>
                `;
            }).join('') || '<div class="empty-state">无客户数据</div>';
        };

        window.setClientFilter = (id) => {
            activeClientFilter = id;
            renderClients();
        };

        // ===== 日历渲染 =====
        const renderCalendar = () => {
            document.querySelectorAll('.view-switcher-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === calendarMode));
            if (calendarMode === 'month') renderMonthView();
            else if (calendarMode === 'week') renderWeekView();
            else renderDayView();
        };

        const renderMonthView = () => {
            document.getElementById('cal-container-month').style.display = 'block';
            document.getElementById('cal-container-week').style.display = 'none';
            document.getElementById('cal-container-day').style.display = 'none';

            const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
            document.getElementById('calTitle').innerText = `${y}年 ${m+1}月`;

            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m+1, 0).getDate();

            let html = ['日','一','二','三','四','五','六'].map(d => `<div style="text-align:center; font-size:12px; color:var(--text-dim); padding:8px 0; background:var(--bg-secondary)">${d}</div>`).join('');

            for (let i = 0; i < firstDay; i++) {
                html += `<div class="calendar-day" style="background:var(--bg-secondary); opacity:0.3"></div>`;
            }

            const today = getTodayStr();
            // 如果没有选中日期，默认选中今天
            if (!selectedMonthDate) {
                selectedMonthDate = today;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const visits = data.visits.filter(v => v.date === dateStr);
                const isToday = dateStr === today;
                const isSelected = dateStr === selectedMonthDate;
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}" onclick="selectMonthDate('${dateStr}')">
                        <div class="day-num" style="${isToday ? 'color:var(--accent); font-weight:700' : ''}">${d}</div>
                        <div style="display:flex; gap:2px; justify-content:center; flex-wrap:wrap;">
                            ${visits.slice(0,3).map(v => {
                                const colors = { pending: '#ffa726', done: '#00d4aa', missed: '#ff5252', reschedule: '#42a5f5' };
                                return `<div class="visit-dot" style="background:${colors[v.status] || colors.pending}"></div>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            document.getElementById('calendarGrid').innerHTML = html;

            // 渲染选中日期的联系计划列表
            renderMonthSelectedList();
        };

        // 月视图选中日期
        window.selectMonthDate = (dateStr) => {
            selectedMonthDate = dateStr;
            renderMonthView(); // 重新渲染以更新选中状态
        };

        // 渲染月视图选中日期的联系计划列表
        const renderMonthSelectedList = () => {
            const container = document.getElementById('monthSelectedList');
            const titleEl = document.getElementById('monthSelectedTitle');
            const countEl = document.getElementById('monthSelectedCount');
            const contentEl = document.getElementById('monthSelectedContent');

            if (!selectedMonthDate) {
                container.style.display = 'none';
                return;
            }

            const today = getTodayStr();
            const visits = data.visits.filter(v => v.date === selectedMonthDate).sort((a, b) => {
                // 待联系排在前面，按状态排序
                const statusOrder = { pending: 0, done: 1, missed: 2, reschedule: 3 };
                return (statusOrder[a.status] || 0) - (statusOrder[b.status] || 0);
            });

            // 格式化日期显示
            const dateObj = new Date(selectedMonthDate.replace(/-/g, '/'));
            const dateDisplay = selectedMonthDate === today ? '今天' : 
                `${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;

            titleEl.innerText = dateDisplay;
            countEl.innerText = `${visits.length} 个计划`;

            if (visits.length === 0) {
                contentEl.innerHTML = '<div class="empty-state" style="padding: 24px;">暂无联系计划</div>';
            } else {
                contentEl.innerHTML = visits.map(v => {
                    const c = data.clients.find(x => x.id === v.clientId);
                    const statusMap = { 
                        pending: ['tag-pending', '待联系'], 
                        done: ['tag-done', '已联系'], 
                        missed: ['tag-missed', '未联系'], 
                        reschedule: ['tag-reschedule', '已改期'] 
                    };
                    const statusKey = v.status || 'pending';
                    const [cls, text] = statusMap[statusKey] || statusMap.pending;
                    const icons = { phone: '📞', wechat: '💬', visit: '🏠', '': '' };

                    // 判断点击行为：当天及之前的待联系记录进入反馈界面，其他进入编辑界面
                    const isPending = v.status === 'pending';
                    const isTodayOrBefore = selectedMonthDate <= today;
                    const clickAction = (isPending && isTodayOrBefore) 
                        ? `openFeedbackModal(${v.id})` 
                        : `openModal('visit_edit', ${v.id})`;

                    // 根据状态和时间设置样式
                    let itemClass = 'calendar-visit-item';
                    if (isPending) {
                        if (selectedMonthDate === today) {
                            itemClass += ' pending-today';
                        } else if (selectedMonthDate < today) {
                            itemClass += ' pending-overdue';
                        } else {
                            itemClass += ' pending-future';
                        }
                    }

                    return `
                        <div class="${itemClass}" onclick="${clickAction}">
                            <div style="flex:1">
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <span style="font-weight:500">${c?.name || '未知'}</span>
                                    <span class="tag ${cls}">${text}</span>
                                </div>
                                <div style="font-size:12px; color:var(--text-muted); margin-top:4px;">${v.notes || '无备注'}</div>
                            </div>
                            ${v.contactType ? `<span style="font-size:14px; margin-left:8px;">${icons[v.contactType]}</span>` : ''}
                        </div>
                    `;
                }).join('');
            }

            container.style.display = 'block';
        };

        const renderWeekView = () => {
            document.getElementById('cal-container-month').style.display = 'none';
            document.getElementById('cal-container-week').style.display = 'block';
            document.getElementById('cal-container-day').style.display = 'none';

            const start = new Date(currentWeek);
            start.setDate(start.getDate() - start.getDay());
            const end = new Date(start);
            end.setDate(end.getDate() + 6);
            document.getElementById('calTitleWeek').innerText = `${start.getMonth()+1}/${start.getDate()} - ${end.getMonth()+1}/${end.getDate()}`;

            const today = getTodayStr();

            let html = '';
            for (let i = 0; i < 7; i++) {
                const d = new Date(start);
                d.setDate(d.getDate() + i);
                const dateStr = formatObjToStr(d);
                const visits = data.visits.filter(v => v.date === dateStr);
                html += `
                    <div class="card" style="margin-bottom: 8px;">
                        <div style="display: flex; align-items: center; padding: 12px 16px; ${visits.length > 0 ? 'border-bottom:1px solid var(--border)' : ''}">
                            <div style="font-weight: 600; width: 40px; color: ${dateStr === today ? 'var(--accent)' : 'inherit'}">${['日','一','二','三','四','五','六'][d.getDay()]}</div>
                            <div style="color: var(--text-muted); font-size: 13px;">${d.getDate()}日</div>
                            <button class="btn btn-small btn-secondary" style="margin-left:auto; padding: 4px 8px; font-size: 11px;" onclick="openModal('visit', null, '${dateStr}')">+</button>
                        </div>
                        <div>${visits.map(v => renderVisitItem(v, dateStr)).join('')}</div>
                    </div>
                `;
            }
            document.getElementById('weekList').innerHTML = html;
        };

        const renderDayView = () => {
            document.getElementById('cal-container-month').style.display = 'none';
            document.getElementById('cal-container-week').style.display = 'none';
            document.getElementById('cal-container-day').style.display = 'block';

            const dateStr = formatObjToStr(currentDay);
            document.getElementById('calTitleDay').innerText = `${currentDay.getMonth()+1}月${currentDay.getDate()}日`;

            const visits = data.visits.filter(v => v.date === dateStr);
            document.getElementById('dayList').innerHTML = visits.length === 0 ? '<div class="empty-state">暂无安排</div>' : `<div class="card">${visits.map(v => renderVisitItem(v, dateStr)).join('')}</div>`;
        };

        // 通用渲染联系计划项（用于周视图和日视图）
        const renderVisitItem = (v, dateStr) => {
            const c = data.clients.find(x => x.id === v.clientId);
            const statusMap = { 
                pending: ['tag-pending', '待联系'], 
                done: ['tag-done', '已联系'], 
                missed: ['tag-missed', '未联系'], 
                reschedule: ['tag-reschedule', '已改期'] 
            };
            const statusKey = v.status || 'pending';
            const [cls, text] = statusMap[statusKey] || statusMap.pending;
            const icons = { phone: '📞', wechat: '💬', visit: '🏠', '': '' };

            // 判断点击行为：当天及之前的待联系记录进入反馈界面，其他进入编辑界面
            const today = getTodayStr();
            const isPending = v.status === 'pending';
            const isTodayOrBefore = dateStr <= today;
            const clickAction = (isPending && isTodayOrBefore) 
                ? `openFeedbackModal(${v.id})` 
                : `openModal('visit_edit', ${v.id})`;

            return `
                <div style="display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer;" onclick="${clickAction}">
                    <div style="flex:1">
                        <div style="font-weight: 500">${c?.name || '未知'}</div>
                        <div style="font-size: 12px; color: var(--text-muted)">${v.notes || '无备注'}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        ${v.contactType ? `<span style="font-size:14px;">${icons[v.contactType]}</span>` : ''}
                        <span class="tag ${cls}">${text}</span>
                    </div>
                </div>
            `;
        };

        window.handleDayClick = (dateStr) => {
            calendarMode = 'day';
            currentDay = new Date(dateStr.replace(/-/g, '/'));
            renderCalendar();
        };

        window.switchCalendarMode = (mode) => {
            calendarMode = mode;
            // 切换模式时重置选中日期
            if (mode === 'month') {
                selectedMonthDate = getTodayStr();
            }
            renderCalendar();
        };

        window.changeMonth = (d) => { 
            currentMonth.setMonth(currentMonth.getMonth() + d); 
            selectedMonthDate = null; // 切换月份时重置选中
            renderMonthView(); 
        };
        window.changeWeek = (d) => { currentWeek.setDate(currentWeek.getDate() + 7 * d); renderWeekView(); };
        window.changeDay = (d) => { currentDay.setDate(currentDay.getDate() + d); renderDayView(); };
        window.getSelectedDayStr = () => formatObjToStr(currentDay);

        // ===== 记录页面 =====
        const renderRecords = () => {
            const filterWrapper = document.getElementById('record-filter-bar');
            const options = data.clients.map(c => `<option value="${c.id}" ${activeRecordFilter == c.id ? 'selected' : ''}>${c.name}</option>`).join('');
            filterWrapper.innerHTML = `<select class="form-select" onchange="filterRecords(this.value)" style="margin-bottom:8px;"><option value="all" ${activeRecordFilter === 'all' ? 'selected' : ''}>全部客户</option>${options}</select>`;

            let filtered = data.visits.filter(v => v.status === 'done');
            if (activeRecordFilter !== 'all') filtered = filtered.filter(v => v.clientId === parseInt(activeRecordFilter));

            const sorted = filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            const contactMap = { phone: '电话', wechat: '微信', visit: '上门', '': '-' };
            const icons = { phone: '📞', wechat: '💬', visit: '🏠', '': '' };

            document.getElementById('records-list').innerHTML = sorted.map(v => {
                const c = data.clients.find(x => x.id === v.clientId);
                let followUp = v.stopReason ? `<div style="margin-top:8px; font-size:12px; color:var(--danger);">不再跟进: ${v.stopReason}</div>` :
                    v.nextDate ? `<div style="margin-top:8px; font-size:12px; color:var(--accent);">下次跟进: ${v.nextDate} - ${v.nextGoal || '无目标'}</div>` : '';
                return `
                    <div class="card" style="margin-bottom: 12px;">
                        <div style="padding: 16px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="font-weight: 600">${c?.name || '未知'}</span>
                                <span style="font-size: 12px; color: var(--text-muted)">${v.date}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;">
                                <span style="font-size: 14px; background: var(--accent-soft); padding: 2px 8px; border-radius: 4px; color: var(--accent);">
                                    ${icons[v.contactType] || ''} ${contactMap[v.contactType] || '-'}
                                </span>
                            </div>
                            <div style="font-size: 14px; color: var(--text)">${v.detail || '无详情记录'}</div>
                            ${followUp}
                        </div>
                    </div>
                `;
            }).join('') || '<div class="empty-state">暂无联系记录</div>';
        };

        window.filterRecords = (id) => { activeRecordFilter = id; renderRecords(); };

        // ===== 导航 =====
        window.navigate = (viewId) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            document.querySelectorAll('.nav-item-mobile').forEach(n => n.classList.remove('active'));
            document.querySelector(`.nav-item-mobile[data-view="${viewId}"]`)?.classList.add('active');

            if (viewId === 'home') { homeFilterOverdue = false; renderHome(); }
            if (viewId === 'clients') renderClients();
            if (viewId === 'calendar') { 
                // 进入日历视图时默认选中今天
                selectedMonthDate = getTodayStr();
                renderCalendar(); 
            }
            if (viewId === 'records') renderRecords();

            const titles = { home: '工作台', clients: '客户管理', calendar: '联系日历', records: '联系记录' };
            document.getElementById('pageTitle').innerText = titles[viewId];
        };

        // ===== 模态框 =====
        window.openModal = (type, id = null, dateOverride = null, preselectedClient = null) => {
            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            const header = document.getElementById('modalHeader');
            const footer = document.getElementById('modalFooter');

            // 标准底部按钮（取消+保存）
            const standardFooter = `
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modalSaveBtn">保存</button>
            `;

            // 带删除的底部按钮（删除+取消+保存）
            const deleteFooter = (deleteFn) => `
                <button class="btn btn-danger" onclick="${deleteFn}">删除</button>
                <button class="btn btn-secondary" onclick="closeModal()" style="flex:1;">取消</button>
                <button class="btn btn-primary" id="modalSaveBtn" style="flex:1;">保存</button>
            `;

            if (type === 'client') {
                header.innerText = id ? '编辑客户' : '新增客户';
                let c = id ? data.clients.find(x => x.id === id) : { name: '', contact: '', industryId: '', level: 'normal', notes: '' };
                const indOpts = data.industries.map(i => `<option value="${i.id}" ${c.industryId === i.id ? 'selected' : ''}>${i.name}</option>`).join('');
                body.innerHTML = `
                    <input type="text" class="form-input" id="c_name" value="${c.name}" placeholder="客户名称 *">
                    <input type="text" class="form-input" id="c_contact" value="${c.contact || ''}" placeholder="联系人">
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <select class="form-select" id="c_industry" style="margin-bottom:0; flex:1"><option value="">未选择</option>${indOpts}</select>
                        <button class="btn btn-secondary btn-small" onclick="openModal('industry')">管理</button>
                    </div>
                    <select class="form-select" id="c_level" style="margin-top:12px;"><option value="normal" ${c.level === 'normal' ? 'selected' : ''}>一般</option><option value="important" ${c.level === 'important' ? 'selected' : ''}>重要</option></select>
                    <textarea class="form-input" id="c_notes" placeholder="备注">${c.notes || ''}</textarea>
                    ${id ? `<button class="btn btn-danger" style="margin-top:10px;" onclick="deleteClient(${id})">删除客户</button>` : ''}
                `;
                footer.innerHTML = standardFooter;
                
                document.getElementById('modalSaveBtn').onclick = () => {
                    const name = document.getElementById('c_name')?.value;
                    if (!name) return alert('请填写客户名称');
                    const clientData = {
                        name, contact: document.getElementById('c_contact')?.value || '',
                        industryId: parseInt(document.getElementById('c_industry')?.value) || null,
                        level: document.getElementById('c_level')?.value || 'normal',
                        notes: document.getElementById('c_notes')?.value || ''
                    };
                    if (id) {
                        Object.assign(data.clients.find(c => c.id === id), clientData);
                    } else {
                        const newId = Date.now();
                        data.clients.push({ id: newId, ...clientData, avatar: name.charAt(0) });
                        setTimeout(() => {
                            if (confirm('客户信息已保存。是否立即添加联系计划？')) {
                                openModal('visit', null, null, newId);
                            }
                        }, 300);
                    }
                    saveData(); closeModal(); renderClients(); renderHome();
                };
            }
            else if (type === 'industry') {
                header.innerText = '行业管理';
                const list = data.industries.map(i => `
                    <div class="ind-row">
                        <input type="text" value="${i.name}" onchange="updateIndustryName(${i.id}, this.value)">
                        <button onclick="deleteIndustry(${i.id})" style="background:none; border:none; color:var(--danger);">✕</button>
                    </div>
                `).join('');
                body.innerHTML = `
                    <div style="margin-bottom:16px;">${list || '<div style="color:var(--text-muted); text-align:center;">暂无行业</div>'}</div>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="new_industry" class="form-input" placeholder="新行业名称" style="margin-bottom:0;">
                        <button class="btn btn-primary btn-small" onclick="addIndustry()">添加</button>
                    </div>
                `;
                footer.innerHTML = `<button class="btn btn-secondary" onclick="closeModal()">关闭</button>`;
            }
            else if (type === 'visit') {
                header.innerText = '新建联系计划';
                const clientOpts = data.clients.map(c => `<option value="${c.id}" ${c.id === preselectedClient ? 'selected' : ''}>${c.name}</option>`).join('');
                body.innerHTML = `
                    <select class="form-select" id="m_client"><option value="">选择客户 *</option>${clientOpts}</select>
                    <input type="date" class="form-input" id="m_date" value="${dateOverride || getTodayStr()}">
                    <textarea class="form-input" id="m_notes" placeholder="联系目的..."></textarea>
                `;
                footer.innerHTML = standardFooter;
                
                document.getElementById('modalSaveBtn').onclick = () => {
                    const clientId = parseInt(document.getElementById('m_client')?.value);
                    const date = document.getElementById('m_date')?.value;
                    const notes = document.getElementById('m_notes')?.value || '';
                    if (!clientId || !date) return alert('请选择客户和日期');

                    const existing = data.visits.find(v => v.clientId === clientId && v.date === date && v.status === 'pending');
                    if (existing) {
                        if (confirm('该客户当天已有联系计划。\n点击【确定】编辑现有计划，【取消】返回修改。')) {
                            closeModal();
                            setTimeout(() => openModal('visit_edit', existing.id), 300);
                        }
                        return;
                    }

                    data.visits.push({
                        id: Date.now(), clientId, date, status: 'pending', notes,
                        detail: '', nextDate: '', nextGoal: '', stopReason: '', contactType: ''
                    });
                    saveData(); closeModal(); renderHome(); renderCalendar();
                };
            }
            else if (type === 'visit_edit') {
                const visit = data.visits.find(v => v.id === id);
                const client = data.clients.find(c => c.id === visit.clientId);
                header.innerText = '联系详情';

                // ========== pending 状态：简单编辑（可调整时间） ==========
                if (visit.status === 'pending') {
                    body.innerHTML = `
                        <div style="margin-bottom:16px; padding:12px; background:var(--bg); border-radius:12px;">
                            <div style="font-weight:600; margin-bottom:4px;">${client?.name || '未知'}</div>
                            <div style="font-size:12px; color:var(--text-muted);">当前状态: <span class="tag tag-pending">待联系</span></div>
                        </div>
                        
                        <label style="font-size:12px; color:var(--text-muted);">联系日期 <span class="required-star">*</span></label>
                        <input type="date" class="form-input" id="edit_pending_date" value="${visit.date}" style="margin-bottom:16px;">
                        
                        <label style="font-size:12px; color:var(--text-muted);">联系目的</label>
                        <textarea class="form-input" id="edit_pending_notes" placeholder="联系目的...">${visit.notes || ''}</textarea>
                    `;
                    
                    footer.innerHTML = deleteFooter(`deleteVisit(${id})`);
                    
                    document.getElementById('modalSaveBtn').onclick = () => {
                        const newDate = document.getElementById('edit_pending_date').value;
                        const newNotes = document.getElementById('edit_pending_notes').value;
                        
                        if (!newDate) return alert('请选择联系日期');
                        
                        // 检查是否与其他待办冲突
                        const conflict = data.visits.find(v => 
                            v.id !== visit.id &&
                            v.clientId === visit.clientId && 
                            v.date === newDate && 
                            v.status === 'pending'
                        );
                        
                        if (conflict) {
                            if (!confirm('该客户当天已有其他联系计划，确定要调整到这个日期吗？')) {
                                return;
                            }
                        }
                        
                        visit.date = newDate;
                        visit.notes = newNotes;
                        
                        saveData();
                        closeModal();
                        renderHome();
                        renderCalendar();
                    };
                    
                    overlay.classList.add('active');
                    return;
                }

                // ========== 非 pending 状态：完整反馈编辑 ==========
                const hasStop = visit.stopReason && visit.stopReason.trim();
                const defaultContinue = !hasStop;

                body.innerHTML = `
                    <div style="margin-bottom:16px; padding:12px; background:var(--bg); border-radius:12px;">
                        <div style="font-weight:600; margin-bottom:4px;">${client?.name || '未知'}</div>
                        <div style="font-size:12px; color:var(--text-muted);">计划时间: ${visit.date}</div>
                    </div>

                    <label style="font-size:12px; color:var(--text-muted);">当前状态</label>
                    <div class="status-options" style="margin-bottom:16px;">
                        <div class="status-option ${visit.status === 'done' ? 'active done' : ''}" onclick="setEditStatus('done')">已联系</div>
                        <div class="status-option ${visit.status === 'reschedule' ? 'active reschedule' : ''}" onclick="setEditStatus('reschedule')">改期</div>
                        <div class="status-option ${visit.status === 'missed' ? 'active missed' : ''}" onclick="setEditStatus('missed')">未联系</div>
                    </div>
                    <input type="hidden" id="edit_status" value="${visit.status}">

                    <div id="edit_contact_type_container" style="margin-top:16px; display:${visit.status === 'done' ? 'block' : 'none'};">
                        <label style="font-size:12px; color:var(--text-muted);">联系方式 <span class="required-star">*</span></label>
                        <div class="contact-type-options" style="margin-top:8px;">
                            <div class="contact-type-option ${visit.contactType === 'phone' ? 'active' : ''}" id="edit_ct_phone" onclick="setEditContactType('phone')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                <div>电话</div>
                            </div>
                            <div class="contact-type-option ${visit.contactType === 'wechat' ? 'active' : ''}" id="edit_ct_wechat" onclick="setEditContactType('wechat')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                                <div>微信</div>
                            </div>
                            <div class="contact-type-option ${visit.contactType === 'visit' ? 'active' : ''}" id="edit_ct_visit" onclick="setEditContactType('visit')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                <div>上门</div>
                            </div>
                        </div>
                        <input type="hidden" id="edit_contact_type" value="${visit.contactType || 'phone'}">
                    </div>

                    <div id="edit_desc_container" style="margin-top:16px;">
                        <label style="font-size:12px; color:var(--text-muted);" id="edit_desc_label">${visit.status === 'missed' ? '未联系原因 <span class="required-star">*</span>' : '情况说明'}</label>
                        <textarea class="form-input" id="edit_detail" style="margin-top:8px; margin-bottom:0;" placeholder="${visit.status === 'missed' ? '请填写未联系原因' : '记录详情...'}">${visit.detail || ''}</textarea>
                    </div>

                    <!-- 改期字段：放在改期原因下方 -->
                    <div id="edit_reschedule_field" style="margin-top:16px; display:${visit.status === 'reschedule' ? 'block' : 'none'};">
                        <label style="font-size:12px; color:var(--text-muted);">改期至 <span class="required-star">*</span></label>
                        <input type="date" class="form-input" id="edit_reschedule_date" value="${visit.date}" style="margin-bottom:0;">
                    </div>

                    <div style="margin-top:16px;">
                        <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:8px;">后续安排</label>
                        <div class="follow-up-toggle" style="margin-bottom:12px;">
                            <div class="follow-up-btn ${defaultContinue ? 'active' : ''}" id="edit_btn_continue" onclick="toggleEditFollowUp('continue')">继续跟进</div>
                            <div class="follow-up-btn stop ${!defaultContinue ? 'active' : ''}" id="edit_btn_stop" onclick="toggleEditFollowUp('stop')">不再跟进</div>
                        </div>
                        
                        <div class="follow-up-content ${defaultContinue ? 'show' : ''}" id="edit_content_continue">
                            <div style="display:flex; gap:8px; margin-bottom:8px;">
                                <input type="date" class="form-input" id="edit_next_date" style="flex:1; margin-bottom:0;" value="${visit.nextDate || ''}">
                            </div>
                            <input type="text" class="form-input" id="edit_next_goal" style="margin-bottom:0;" value="${visit.nextGoal || ''}" placeholder="跟进目标">
                        </div>
                        
                        <div class="follow-up-content ${!defaultContinue ? 'show' : ''}" id="edit_content_stop">
                            <textarea class="form-input" id="edit_stop_reason" style="margin-bottom:0; height:80px;" placeholder="请填写不再跟进的原因（必填）">${visit.stopReason || ''}</textarea>
                        </div>
                    </div>
                `;

                footer.innerHTML = deleteFooter(`deleteVisit(${id})`);

                window.setEditStatus = (s) => {
                    document.getElementById('edit_status').value = s;
                    document.querySelectorAll('.status-option').forEach(el => {
                        el.classList.remove('active', 'done', 'reschedule', 'missed');
                        if (el.getAttribute('onclick').includes(`'${s}'`)) {
                            el.classList.add('active', s);
                        }
                    });
                    const ct = document.getElementById('edit_contact_type_container');
                    const label = document.getElementById('edit_desc_label');
                    const input = document.getElementById('edit_detail');
                    const rf = document.getElementById('edit_reschedule_field');
                    
                    ct.style.display = s === 'done' ? 'block' : 'none';
                    if (s === 'done') {
                        label.innerText = '联系详情';
                        input.placeholder = '记录本次联系成果...';
                        rf.style.display = 'none';
                    } else if (s === 'missed') {
                        label.innerHTML = '未联系原因 <span class="required-star">*</span>';
                        input.placeholder = '请填写未联系原因（必填）';
                        rf.style.display = 'none';
                    } else if (s === 'reschedule') {
                        label.innerText = '改期原因';
                        input.placeholder = '请填写改期原因...';
                        rf.style.display = 'block';
                    }
                };

                window.setEditContactType = (t) => {
                    document.getElementById('edit_contact_type').value = t;
                    document.querySelectorAll('.contact-type-option').forEach(el => el.classList.remove('active'));
                    document.getElementById(`edit_ct_${t}`).classList.add('active');
                };

                window.toggleEditFollowUp = (t) => {
                    const bc = document.getElementById('edit_btn_continue');
                    const bs = document.getElementById('edit_btn_stop');
                    const cc = document.getElementById('edit_content_continue');
                    const cs = document.getElementById('edit_content_stop');
                    if (t === 'continue') {
                        bc.classList.add('active'); bs.classList.remove('active');
                        cc.classList.add('show'); cs.classList.remove('show');
                    } else {
                        bc.classList.remove('active'); bs.classList.add('active');
                        cc.classList.remove('show'); cs.classList.add('show');
                    }
                };

                document.getElementById('modalSaveBtn').onclick = () => {
                    const status = document.getElementById('edit_status').value;
                    const detail = document.getElementById('edit_detail').value;
                    
                    if (status === 'missed' && !detail.trim()) return alert('请填写未联系原因');

                    visit.status = status;
                    visit.detail = detail;
                    visit.contactType = status === 'done' ? document.getElementById('edit_contact_type').value : '';

                    if (status === 'done') {
                        const isContinue = document.getElementById('edit_btn_continue').classList.contains('active');
                        if (isContinue) {
                            const nextDate = document.getElementById('edit_next_date').value;
                            const nextGoal = document.getElementById('edit_next_goal').value;
                            visit.nextDate = nextDate;
                            visit.nextGoal = nextGoal;
                            visit.stopReason = '';
