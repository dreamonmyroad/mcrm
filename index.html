                            if (nextDate) {
                                const exists = data.visits.find(v => 
                                    v.clientId === visit.clientId && 
                                    v.date === nextDate && 
                                    v.status === 'pending'
                                );
                                if (!exists) {
                                    data.visits.push({
                                        id: Date.now() + Math.floor(Math.random() * 1000),
                                        clientId: visit.clientId,
                                        date: nextDate,
                                        status: 'pending',
                                        notes: `跟进: ${nextGoal || ''}`,
                                        detail: '',
                                        nextDate: '',
                                        nextGoal: '',
                                        stopReason: '',
                                        contactType: ''
                                    });
                                }
                            }
                        } else {
                            const stopReason = document.getElementById('edit_stop_reason').value;
                            if (!stopReason.trim()) return alert('请填写不再跟进的原因');
                            visit.stopReason = stopReason;
                            visit.nextDate = '';
                            visit.nextGoal = '';
                        }
                    } else if (status === 'reschedule') {
                        const newDate = document.getElementById('edit_reschedule_date').value;
                        if (!newDate) return alert('请选择改期日期');
                        if (newDate) {
                            visit.date = newDate;
                            visit.status = 'pending';
                        }
                    }

                    saveData();
                    closeModal();
                    renderHome();
                    renderCalendar();
                    renderRecords();
                };

                overlay.classList.add('active');
                return;
            }
            else if (type === 'history') {
                const client = data.clients.find(c => c.id === id);
                const visits = data.visits.filter(v => v.clientId === id).sort((a, b) => new Date(b.date) - new Date(a.date));
                header.innerText = `联系履历 - ${client?.name || '未知'}`;
                
                const contactMap = { phone: '电话', wechat: '微信', visit: '上门', '': '-' };
                const icons = { phone: '📞', wechat: '💬', visit: '🏠', '': '' };
                
                body.innerHTML = visits.length === 0 ? '<div class="empty-state">暂无联系记录</div>' :
                    visits.map(v => {
                        const statusMap = { pending: ['tag-pending', '待联系'], done: ['tag-done', '已联系'], missed: ['tag-missed', '未联系'], reschedule: ['tag-reschedule', '已改期'] };
                        const [cls, txt] = statusMap[v.status] || statusMap.pending;
                        let follow = v.stopReason ? `<div style="font-size:12px; color:var(--danger); margin-top:4px;">不再跟进: ${v.stopReason}</div>` :
                            v.nextDate ? `<div style="font-size:12px; color:var(--accent); margin-top:4px;">下次: ${v.nextDate} ${v.nextGoal || ''}</div>` : '';
                        const ct = v.contactType ? `<span style="font-size:12px; background:var(--accent-soft); color:var(--accent); padding:2px 6px; border-radius:4px; margin-left:8px;">${icons[v.contactType]} ${contactMap[v.contactType]}</span>` : '';
                        return `
                            <div class="history-item">
                                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                    <span style="font-weight:600">${v.date}${ct}</span>
                                    <span class="tag ${cls}">${txt}</span>
                                </div>
                                <div style="font-size:13px; color:var(--text-muted)">${v.notes || '无计划备注'}</div>
                                ${v.detail ? `<div style="font-size:13px; color:var(--text); margin-top:4px; padding-top:4px; border-top:1px dashed var(--border);">结果: ${v.detail}</div>` : ''}
                                ${follow}
                            </div>
                        `;
                    }).join('');
                
                footer.innerHTML = `<button class="btn btn-secondary" onclick="closeModal()">关闭</button>`;
                overlay.classList.add('active');
                return;
            }

            overlay.classList.add('active');
        };

        // ===== 首页反馈弹窗 =====
        window.openFeedbackModal = (visitId) => {
            // 重新获取 visit 对象，确保是最新数据
            const visit = data.visits.find(v => v.id === visitId);
            if (!visit) {
                console.error('Visit not found:', visitId);
                return;
            }
            
            const client = data.clients.find(c => c.id === visit.clientId);
            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            const header = document.getElementById('modalHeader');
            const footer = document.getElementById('modalFooter');

            header.innerText = `反馈 - ${client?.name || '未知'}`;
            
            // 判断默认跟进状态：如果有 stopReason 则默认停止，否则继续
            const hasStopReason = visit.stopReason && visit.stopReason.trim();
            const defaultToContinue = !hasStopReason;

            // 注意：改期字段现在放在改期原因下方
            body.innerHTML = `
                <div style="margin-bottom:16px; padding:12px; background:var(--bg); border-radius:12px;">
                    <div style="font-size:12px; color:var(--text-muted); margin-bottom:4px;">计划时间: ${visit.date}</div>
                    <div style="font-size:13px; color:var(--text);">${visit.notes || '无备注'}</div>
                </div>

                <label style="font-size:12px; color:var(--text-muted);">联系状态</label>
                <div class="status-options" style="margin-bottom:16px;">
                    <div class="status-option active done" onclick="setFbStatus('done')">已联系</div>
                    <div class="status-option" onclick="setFbStatus('reschedule')">改期</div>
                    <div class="status-option" onclick="setFbStatus('missed')">未联系</div>
                </div>
                <input type="hidden" id="fb_status" value="done">

                <div id="fb_contact_type_container" style="margin-bottom:16px;">
                    <label style="font-size:12px; color:var(--text-muted);">联系方式 <span class="required-star">*</span></label>
                    <div class="contact-type-options" style="margin-top:8px;">
                        <div class="contact-type-option active" id="fb_ct_phone" onclick="setFbContactType('phone')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <div>电话</div>
                        </div>
                        <div class="contact-type-option" id="fb_ct_wechat" onclick="setFbContactType('wechat')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                            <div>微信</div>
                        </div>
                        <div class="contact-type-option" id="fb_ct_visit" onclick="setFbContactType('visit')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                            <div>上门</div>
                        </div>
                    </div>
                    <input type="hidden" id="fb_contact_type" value="${visit.contactType || 'phone'}">
                </div>

                <div id="fb_detail_container">
                    <label style="font-size:12px; color:var(--text-muted);" id="fb_detail_label">联系详情</label>
                    <textarea class="form-input" id="fb_detail" style="margin-top:8px; margin-bottom:16px;" placeholder="记录本次联系成果...">${visit.detail || ''}</textarea>
                </div>

                <!-- 改期至：放在改期原因下方 -->
                <div id="fb_reschedule_field" style="display:none; margin-bottom:16px;">
                    <label style="font-size:12px; color:var(--text-muted);">改期至 <span class="required-star">*</span></label>
                    <input type="date" class="form-input" id="fb_reschedule_date" value="${visit.date}" style="margin-bottom:0;">
                </div>

                <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:8px;">后续安排</label>
                <div class="follow-up-toggle" style="margin-bottom:12px;">
                    <div class="follow-up-btn ${defaultToContinue ? 'active' : ''}" id="fb_btn_continue" onclick="toggleFbFollowUp('continue')">继续跟进</div>
                    <div class="follow-up-btn stop ${!defaultToContinue ? 'active' : ''}" id="fb_btn_stop" onclick="toggleFbFollowUp('stop')">不再跟进</div>
                </div>
                
                <div class="follow-up-content ${defaultToContinue ? 'show' : ''}" id="fb_content_continue">
                    <div style="display:flex; gap:8px; margin-bottom:8px;">
                        <input type="date" class="form-input" id="fb_next_date" style="flex:1; margin-bottom:0;" value="${visit.nextDate || ''}">
                    </div>
                    <input type="text" class="form-input" id="fb_next_goal" style="margin-bottom:0;" value="${visit.nextGoal || ''}" placeholder="跟进目标">
                </div>
                
                <div class="follow-up-content ${!defaultToContinue ? 'show' : ''}" id="fb_content_stop">
                    <textarea class="form-input" id="fb_stop_reason" style="margin-bottom:0; height:80px;" placeholder="请填写不再跟进的原因（必填）">${visit.stopReason || ''}</textarea>
                </div>
            `;

            // 设置底部按钮：删除 + 取消 + 保存
            footer.innerHTML = `
                <button class="btn btn-danger" onclick="deleteVisitFromFeedback(${visit.id})">删除</button>
                <button class="btn btn-secondary" onclick="closeModal()" style="flex:1;">取消</button>
                <button class="btn btn-primary" id="modalSaveBtn" style="flex:1;">保存</button>
            `;

            // 状态切换函数
            window.setFbStatus = (s) => {
                document.getElementById('fb_status').value = s;
                document.querySelectorAll('.status-option').forEach(el => {
                    el.classList.remove('active', 'done', 'reschedule', 'missed');
                    if (el.getAttribute('onclick').includes(`'${s}'`)) {
                        el.classList.add('active', s);
                    }
                });
                
                const ct = document.getElementById('fb_contact_type_container');
                const label = document.getElementById('fb_detail_label');
                const input = document.getElementById('fb_detail');
                const rf = document.getElementById('fb_reschedule_field');
                
                ct.style.display = s === 'done' ? 'block' : 'none';
                
                if (s === 'done') {
                    label.innerText = '联系详情';
                    input.placeholder = '记录本次联系成果...';
                    rf.style.display = 'none';
                } else if (s === 'missed') {
                    label.innerHTML = '未联系原因 <span class="required-star">*</span>';
                    input.placeholder = '请填写未联系原因（必填）';
                    rf.style.display = 'none';
                } else if (s === 'reschedule') {
                    label.innerText = '改期原因';
                    input.placeholder = '请填写改期原因...';
                    rf.style.display = 'block';
                }
            };

            // 联系方式切换
            window.setFbContactType = (t) => {
                document.getElementById('fb_contact_type').value = t;
                document.querySelectorAll('.contact-type-option').forEach(el => el.classList.remove('active'));
                document.getElementById(`fb_ct_${t}`)?.classList.add('active');
            };

            // 跟进/停止切换
            window.toggleFbFollowUp = (t) => {
                const bc = document.getElementById('fb_btn_continue');
                const bs = document.getElementById('fb_btn_stop');
                const cc = document.getElementById('fb_content_continue');
                const cs = document.getElementById('fb_content_stop');
                
                if (t === 'continue') {
                    bc?.classList.add('active');
                    bs?.classList.remove('active');
                    cc?.classList.add('show');
                    cs?.classList.remove('show');
                } else {
                    bc?.classList.remove('active');
                    bs?.classList.add('active');
                    cc?.classList.remove('show');
                    cs?.classList.add('show');
                }
            };

            // 初始化联系方式显示
            const savedContactType = visit.contactType || 'phone';
            setFbContactType(savedContactType);

            // 删除函数
            window.deleteVisitFromFeedback = (id) => {
                if (!confirm('确定要删除这条联系计划吗？')) return;
                data.visits = data.visits.filter(v => v.id !== id);
                saveData();
                closeModal();
                renderHome();
                renderCalendar();
                renderRecords();
            };

            // 保存按钮事件
            document.getElementById('modalSaveBtn').onclick = () => {
                const currentVisitId = visitId;
                const currentVisit = data.visits.find(v => v.id === currentVisitId);
                
                if (!currentVisit) {
                    alert('记录不存在，可能已被删除');
                    closeModal();
                    return;
                }

                const status = document.getElementById('fb_status').value;
                const detail = document.getElementById('fb_detail').value;
                
                // 验证
                if (status === 'missed' && !detail.trim()) {
                    return alert('请填写未联系原因');
                }

                // 更新当前记录
                currentVisit.status = status;
                currentVisit.detail = detail;
                currentVisit.contactType = status === 'done' ? document.getElementById('fb_contact_type').value : '';

                // 处理后续安排
                if (status === 'done') {
                    const isContinue = document.getElementById('fb_btn_continue')?.classList.contains('active');
                    
                    if (isContinue) {
                        // 继续跟进：设置当前记录的下次信息
                        const nextDate = document.getElementById('fb_next_date')?.value || '';
                        const nextGoal = document.getElementById('fb_next_goal')?.value || '';
                        
                        currentVisit.nextDate = nextDate;
                        currentVisit.nextGoal = nextGoal;
                        currentVisit.stopReason = '';
                        
                        // 创建新的待办记录
                        if (nextDate) {
                            // 检查是否已存在相同的待办（防重复）
                            const exists = data.visits.find(v => 
                                v.clientId === currentVisit.clientId && 
                                v.date === nextDate && 
                                v.status === 'pending' &&
                                v.id !== currentVisit.id
                            );
                            
                            if (!exists) {
                                const newVisit = {
                                    id: Date.now() + Math.floor(Math.random() * 1000),
                                    clientId: currentVisit.clientId,
                                    date: nextDate,
                                    status: 'pending',
                                    notes: `跟进: ${nextGoal || ''}`,
                                    detail: '',
                                    nextDate: '',
                                    nextGoal: '',
                                    stopReason: '',
                                    contactType: ''
                                };
                                data.visits.push(newVisit);
                                console.log('Created new pending visit:', newVisit);
                            }
                        }
                    } else {
                        // 停止跟进
                        const stopReason = document.getElementById('fb_stop_reason')?.value || '';
                        if (!stopReason.trim()) {
                            return alert('请填写不再跟进的原因');
                        }
                        currentVisit.stopReason = stopReason;
                        currentVisit.nextDate = '';
                        currentVisit.nextGoal = '';
                    }
                } else if (status === 'reschedule') {
                    // 改期
                    const newDate = document.getElementById('fb_reschedule_date')?.value;
                    if (!newDate) {
                        return alert('请选择改期日期');
                    }
                    if (newDate) {
                        currentVisit.date = newDate;
                        // 改期后保持待办状态
                        currentVisit.status = 'pending';
                    }
                }

                // 保存并刷新
                saveData();
                closeModal();
                
                // 延迟刷新确保数据同步
                setTimeout(() => {
                    renderHome();
                    renderCalendar();
                    renderRecords();
                }, 10);
            };

            overlay.classList.add('active');
        };

        // ===== 辅助操作 =====
        window.deleteClient = (id) => {
            if (!confirm('删除客户将同时删除相关联系记录，确定吗？')) return;
            data.clients = data.clients.filter(c => c.id !== id);
            data.visits = data.visits.filter(v => v.clientId !== id);
            saveData();
            closeModal();
            renderClients();
            renderHome();
        };

        window.deleteVisit = (id) => {
            if (!confirm('确定要删除这条联系计划吗？')) return;
            data.visits = data.visits.filter(v => v.id !== id);
            saveData();
            closeModal();
            renderCalendar();
            renderHome();
        };

        window.addIndustry = () => {
            const input = document.getElementById('new_industry');
            if (!input.value.trim()) return;
            data.industries.push({ id: Date.now(), name: input.value.trim() });
            saveData();
            openModal('industry');
            renderClients();
        };

        window.updateIndustryName = (id, name) => {
            const ind = data.industries.find(i => i.id === id);
            if (ind) ind.name = name;
            saveData();
        };

        window.deleteIndustry = (id) => {
            if (data.industries.length <= 1) return alert('至少保留一个行业分类');
            data.industries = data.industries.filter(i => i.id !== id);
            saveData();
            openModal('industry');
            renderClients();
        };

        // ===== PWA 功能 =====
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,').catch(() => {
                console.log('SW registration skipped');
            });
        }

        let deferredPrompt;
        const installToast = document.getElementById('pwaInstallToast');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installToast?.classList.add('show');
        });

        document.getElementById('pwaInstallBtn')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('User choice:', outcome);
            deferredPrompt = null;
            installToast?.classList.remove('show');
        });

        // ===== 初始化 =====
        document.querySelectorAll('.nav-item-mobile').forEach(el => {
            if (el.dataset.view) el.addEventListener('click', () => navigate(el.dataset.view));
        });
        
        document.querySelectorAll('.view-switcher-btn').forEach(btn => {
            btn.addEventListener('click', () => switchCalendarMode(btn.dataset.mode));
        });

        document.getElementById('modalOverlay').addEventListener('click', () => {
            document.getElementById('modalOverlay').classList.remove('active');
        });

        // 启动应用
        loadData();
        navigate('calendar');
    </script>
</body>
</html>
