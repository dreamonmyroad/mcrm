                        if(!detail.trim()) return alert('请输入拜访详情');
                        
                        const isContinue = document.getElementById('backfill_btn_continue').classList.contains('active');
                        
                        const newVisit = { 
                            id: Date.now(), 
                            clientId, 
                            date, 
                            status: 'done', 
                            notes: notes, 
                            detail: detail, 
                            nextDate: '', 
                            nextGoal: '',
                            stopReason: ''
                        };
                        
                        if (isContinue) {
                            newVisit.nextDate = document.getElementById('b_next_date').value;
                            newVisit.nextGoal = document.getElementById('b_next_goal').value;
                        } else {
                            const stopReason = document.getElementById('b_stop_reason').value;
                            if (!stopReason.trim()) return alert('请填写不再跟进的原因');
                            newVisit.stopReason = stopReason;
                        }
                        
                        data.visits.push(newVisit);
                        saveData();
                        closeModal();
                        renderHome();
                        renderCalendar();
                        renderRecords();
                    };
                    
                    window.toggleBackfillFollowUp = (type) => {
                        const btnContinue = document.getElementById('backfill_btn_continue');
                        const btnStop = document.getElementById('backfill_btn_stop');
                        const contentContinue = document.getElementById('backfill_content_continue');
                        const contentStop = document.getElementById('backfill_content_stop');
                        
                        if (type === 'continue') {
                            btnContinue.classList.add('active');
                            btnStop.classList.remove('active');
                            contentContinue.classList.add('show');
                            contentStop.classList.remove('show');
                        } else {
                            btnContinue.classList.remove('active');
                            btnStop.classList.add('active');
                            contentContinue.classList.remove('show');
                            contentStop.classList.add('show');
                        }
                    };
                    
                    return;
                }

                const existing = data.visits.find(v => v.clientId === clientId && v.date === date && v.status === 'pending');
                if (existing) {
                    const goEdit = confirm("该客户在当天已有拜访计划。\n点击【确定】编辑现有计划，点击【取消】返回修改日期。");
                    if (goEdit) {
                        closeModal();
                        setTimeout(() => openModal('visit_edit', existing.id), 300);
                    }
                    return;
                }

                data.visits.push({ 
                    id: Date.now(), 
                    clientId, 
                    date, 
                    status: 'pending', 
                    notes: notes, 
                    detail: '', 
                    nextDate: '', 
                    nextGoal: '',
                    stopReason: ''
                });
                saveData(); closeModal(); renderHome(); renderCalendar();
            }
            else if (type === 'visit_edit') {
                const visit = data.visits.find(v => v.id === id);
                const status = document.getElementById('v_status').value;
                const detail = document.getElementById('v_detail').value;
                
                if (status === 'missed' && !detail) {
                    return alert('未拜访情况下，情况说明为必填项');
                }

                visit.status = status;
                visit.detail = detail;

                if (status === 'done') {
                    const isContinue = document.getElementById('modal_btn_continue').classList.contains('active');
                    
                    if (isContinue) {
                        visit.nextDate = document.getElementById('v_next_date').value;
                        visit.nextGoal = document.getElementById('v_next_goal').value;
                        visit.stopReason = '';
                        
                        if (visit.nextDate) {
                            data.visits.push({
                                id: Date.now() + 1,
                                clientId: visit.clientId,
                                date: visit.nextDate,
                                status: 'pending',
                                notes: `跟进: ${visit.nextGoal || ''}`,
                                detail: '', 
                                nextDate: '', 
                                nextGoal: '',
                                stopReason: ''
                            });
                        }
                    } else {
                        const stopReason = document.getElementById('v_stop_reason').value;
                        if (!stopReason.trim()) return alert('请填写不再跟进的原因');
                        visit.stopReason = stopReason;
                        visit.nextDate = '';
                        visit.nextGoal = '';
                    }
                } else if (status === 'reschedule') {
                    const newDate = document.getElementById('v_reschedule_date').value;
                    if(newDate) visit.date = newDate;
                    visit.status = 'pending'; 
                }

                saveData(); closeModal(); renderHome(); renderCalendar(); renderRecords();
            }
        };

        // --- Helper Actions ---
        window.deleteClient = (id) => {
            if(confirm('删除客户将同时删除相关拜访记录，确定吗？')) {
                data.clients = data.clients.filter(c => c.id !== id);
                data.visits = data.visits.filter(v => v.clientId !== id);
                saveData();
                closeModal();
                renderClients();
                renderHome();
            }
        };

        window.deleteVisit = (id) => {
            if(confirm('确定要删除这条拜访计划吗？')) {
                data.visits = data.visits.filter(v => v.id !== id);
                saveData();
                closeModal();
                renderCalendar();
                renderHome();
            }
        };

        window.addIndustry = () => {
            const input = document.getElementById('new_industry');
            if(input.value.trim()) {
                data.industries.push({ id: Date.now(), name: input.value.trim() });
                saveData();
                openModal('industry');
                renderClients();
            }
        };

        window.updateIndustryName = (id, name) => {
            const ind = data.industries.find(i => i.id === id);
            if(ind) ind.name = name;
            saveData();
            renderClients();
        };

        window.deleteIndustry = (id) => {
            if(data.industries.length <= 1) return alert("至少保留一个行业分类");
            data.industries = data.industries.filter(i => i.id !== id);
            saveData();
            openModal('industry');
            renderClients();
        };

        // --- Utils ---
        const getTodayStr = () => new Date().toISOString().split('T')[0];
        const formatObjToStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

        // --- Init ---
        document.querySelectorAll('.nav-item-mobile').forEach(el => {
            if(el.dataset.view) el.addEventListener('click', () => navigate(el.dataset.view));
        });
        
        document.querySelectorAll('.view-switcher-btn').forEach(btn => {
            btn.addEventListener('click', () => switchCalendarMode(btn.dataset.mode));
        });

        document.getElementById('modalOverlay').addEventListener('click', closeModal);

        loadData();
        navigate('calendar');
    </script>
</body>
</html>
